<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keith's Cocktail Lab — Recipe Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1B2A3E;--navy-deep:#0F1C2E;--accent:#5B7FA6;
  --accent-soft:#8BAABF;--cream:#F7F4EF;--ink:#1C1F26;
  --mid:#3A3A3A;--rule:#C8D4DD;--silver:#8A9AAA;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'EB Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden;}

/* HERO */
.hero{background:var(--navy-deep);padding:48px 24px 36px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(91,127,166,0.2) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.4em;color:var(--accent-soft);text-transform:uppercase;margin-bottom:12px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,9vw,64px);font-weight:300;color:var(--cream);line-height:1;letter-spacing:0.04em;}
.hero-title strong{font-weight:600;color:#fff;}
.hero-rule{display:flex;align-items:center;justify-content:center;gap:12px;margin:16px auto;color:var(--accent);font-size:14px;letter-spacing:0.2em;}
.hero-rule::before,.hero-rule::after{content:'';width:40px;height:1px;background:var(--accent);opacity:0.5;}
.hero-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--accent-soft);letter-spacing:0.08em;}
.hero-count{margin-top:8px;font-size:12px;color:rgba(139,170,191,0.55);letter-spacing:0.06em;}

/* CONTROLS */
.controls{position:sticky;top:0;z-index:100;background:var(--navy);padding:12px 16px;box-shadow:0 2px 16px rgba(0,0,0,0.3);}
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--accent-soft);font-size:14px;pointer-events:none;}
#search{width:100%;padding:10px 12px 10px 36px;background:rgba(255,255,255,0.08);border:1px solid rgba(91,127,166,0.3);border-radius:6px;color:var(--cream);font-family:'EB Garamond',serif;font-size:16px;outline:none;transition:border-color 0.2s,background 0.2s;}
#search::placeholder{color:rgba(247,244,239,0.3);}
#search:focus{border-color:var(--accent);background:rgba(255,255,255,0.11);}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid rgba(91,127,166,0.35);background:transparent;color:var(--accent-soft);font-family:'EB Garamond',serif;font-size:13px;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--cream);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* SECTIONS */
.sections{padding:8px 0 32px;}
.section{border-bottom:1px solid var(--rule);}
.section-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px;background:transparent;border:none;cursor:pointer;text-align:left;transition:background 0.15s;}
.section-toggle:hover{background:rgba(91,127,166,0.05);}
.section-toggle.open{background:rgba(27,42,62,0.04);}
.section-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy);letter-spacing:0.04em;}
.section-meta{display:flex;align-items:center;gap:10px;}
.section-count{font-size:12px;color:var(--accent-soft);letter-spacing:0.05em;}
.section-chevron{color:var(--accent);font-size:12px;transition:transform 0.25s;}
.section-toggle.open .section-chevron{transform:rotate(180deg);}
.section-body{display:none;padding:0 16px 12px;}
.section-body.open{display:block;}
.spirit-label{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.28em;color:var(--accent);text-transform:uppercase;text-align:center;padding:12px 0 8px;position:relative;}
.spirit-label::before,.spirit-label::after{content:'';position:absolute;top:50%;width:26%;height:1px;background:var(--rule);}
.spirit-label::before{left:0;}
.spirit-label::after{right:0;}

/* DRINK ROW */
.drink-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(200,212,221,0.4);cursor:pointer;transition:background 0.12s;gap:8px;}
.drink-row:last-child{border-bottom:none;}
.drink-row:hover .drink-row-name{color:var(--accent);}
.drink-row-name{font-size:17px;font-weight:600;color:var(--ink);line-height:1.2;flex:1;}
.drink-row-desc{font-size:14px;font-style:italic;color:var(--silver);line-height:1.3;margin-top:2px;}
.drink-row-arrow{color:var(--accent-soft);font-size:14px;flex-shrink:0;margin-left:4px;}
.drink-row-section{font-size:11px;color:var(--accent-soft);letter-spacing:0.04em;margin-top:2px;}

/* FULL-SCREEN DETAIL OVERLAY */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--cream);overflow-y:auto;}
.overlay.open{display:block;}
.overlay-header{background:var(--navy);padding:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.back-btn{background:transparent;border:1px solid rgba(91,127,166,0.4);color:var(--accent-soft);padding:7px 14px;border-radius:20px;font-family:'EB Garamond',serif;font-size:14px;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.back-btn:hover{border-color:var(--accent);color:var(--cream);}
.overlay-section-label{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.18em;color:var(--accent-soft);text-transform:uppercase;flex:1;text-align:right;}
.overlay-body{padding:28px 20px 48px;max-width:640px;margin:0 auto;}
.recipe-name{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,7vw,42px);font-weight:600;color:var(--navy);line-height:1.1;margin-bottom:8px;}
.recipe-desc{font-style:italic;font-size:17px;color:var(--mid);line-height:1.5;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--rule);}
.recipe-block{margin-bottom:24px;}
.recipe-block-label{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px;}
.ingredient-list{list-style:none;}
.ingredient-list li{font-size:17px;color:var(--ink);padding:6px 0;border-bottom:1px solid rgba(200,212,221,0.35);line-height:1.3;}
.ingredient-list li:last-child{border-bottom:none;}
.ingredient-list li::before{content:'·';color:var(--accent);margin-right:10px;}
.directions-text{font-size:16px;color:var(--mid);line-height:1.7;}
.swap-list{list-style:none;}
.swap-list li{font-size:15px;color:var(--silver);padding:5px 0;line-height:1.4;}
.swap-list li::before{content:'→';color:var(--accent-soft);margin-right:8px;}
.no-recipe{font-style:italic;color:var(--silver);font-size:16px;padding:16px 0;}

/* SEARCH RESULTS */
#searchResults{padding:0;}
.search-header-bar{padding:14px 16px 4px;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.14em;color:var(--accent-soft);text-transform:uppercase;}
.search-list{padding:0 16px 16px;}
.search-empty{text-align:center;padding:48px 24px;color:var(--silver);font-style:italic;font-size:18px;}

mark{background:rgba(91,127,166,0.18);color:var(--navy);border-radius:2px;padding:0 1px;}
footer{text-align:center;padding:28px 24px;color:var(--accent-soft);font-size:13px;font-style:italic;border-top:1px solid var(--rule);}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-eyebrow">Keith's Cocktail Lab</div>
  <h1 class="hero-title"><strong>Recipe</strong><br>Book</h1>
  <div class="hero-rule">&middot; &middot; &middot;</div>
  <div class="hero-subtitle">Bartender reference &mdash; all recipes</div>
  <div class="hero-count" id="totalCount"></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input type="search" id="search" placeholder="Search by name, ingredient&hellip;" autocomplete="off" spellcheck="false">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-spirit="all">All</button>
    <button class="filter-btn" data-spirit="Gin">Gin</button>
    <button class="filter-btn" data-spirit="Vodka">Vodka</button>
    <button class="filter-btn" data-spirit="Rum">Rum</button>
    <button class="filter-btn" data-spirit="Whiskey / Bourbon">Whiskey &amp; Bourbon</button>
    <button class="filter-btn" data-spirit="Tequila / Mezcal">Tequila &amp; Mezcal</button>
    <button class="filter-btn" data-spirit="Brandy / Cognac">Brandy</button>
    <button class="filter-btn" data-spirit="Amaro / Aperitivo">Amaro</button>
  </div>
</div>

<div id="searchResults" style="display:none;"></div>
<div class="sections" id="sectionsEl"></div>
<footer>Keith's Cocktail Lab &nbsp;&middot;&nbsp; Recipe Book &nbsp;&middot;&nbsp; 436 recipes</footer>

<!-- FULL-SCREEN RECIPE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-header">
    <button class="back-btn" onclick="closeRecipe()">&#8592; Back</button>
    <div class="overlay-section-label" id="overlaySectionLabel"></div>
  </div>
  <div class="overlay-body" id="overlayBody"></div>
</div>

<script>
const SECTIONS = [{"name":"Classics","subsections":[{"spirit":"Gin","drinks":[{"name":"Negroni","desc":"The Botanist gin, Campari, and sweet vermouth in a bitter, citrus-driven Italian classic.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","1 oz Martini & Rossi Sweet Vermouth","1 dash orange bitters"],"directions":"Add gin, Campari, vermouth, and orange bitters to a mixing glass with ice. Stir until cold. Strain over a large cube in a rocks glass. Garnish with a wide orange peel.","swaps":["Use Hendrick's Neptunia for a more coastal, bright version.","Add 1/4 oz Choya Yuzu for a subtle Japanese citrus riff."]},{"name":"Army & Navy","desc":"Aviation gin, lemon, orgeat, and bitters shaken into a bright almond-citrus classic with silky texture.","ingredients":["2 oz Aviation Gin","3/4 oz fresh lemon juice","1/2 oz orgeat syrup","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a shaker with ice and shake until very cold. Double strain into a chilled coupe and garnish with a lemon twist.","swaps":["Use The Botanist for a greener, more botanical build.","Add 1/4 oz St-Germain for a softer floral-almond variation."]},{"name":"Gin Martini","desc":"Hendrick's gin and dry vermouth stirred icy cold with orange bitters and a bright lemon finish.","ingredients":["2 1/2 oz Hendrick's Gin","1/2 oz Martini & Rossi Dry Vermouth","1 dash orange bitters"],"directions":"Add gin, vermouth, and orange bitters to a mixing glass with ice. Stir until very cold and strain into a chilled martini or Nick & Nora glass. Garnish with a lemon twist.","swaps":["Use Aviation for a drier, more classic profile.","Use Hendrick's Oasium for a greener, more aromatic build."]},{"name":"Greyhound","desc":"Vodka or gin with fresh grapefruit juice.","ingredients":["2 oz vodka or gin","4 oz grapefruit juice"],"directions":"Build in a rocks glass over ice and stir. Garnish Grapefruit wedge. Swap / Alternate Swap: Salt rim to make a Salty Dog.","swaps":[]},{"name":"Salty Dog","desc":"Vodka or gin with grapefruit juice and a salted rim.","ingredients":["2 oz vodka or gin","4 oz grapefruit juice","salt rim"],"directions":"Salt the rim of a rocks glass, fill with ice, add ingredients and stir gently. Garnish Grapefruit wedge. Swap / Alternate Swap: Use tequila for a Paloma-style twist.","swaps":[]},{"name":"Pegu Club","desc":"Gin, orange liqueur, lime, and bitters in a crisp colonial classic with bright citrus structure.","ingredients":["2 oz Aviation Gin","3/4 oz Cointreau","1/2 oz fresh lime juice","1 dash Angostura bitters","1 dash orange bitters"],"directions":"Shake with ice until cold and strain into a chilled coupe. Garnish with a lime twist.","swaps":["Use The Botanist for a drier profile.","A dash of grapefruit bitters makes the lime feel even sharper."]},{"name":"Martinez","desc":"Old Tom gin, sweet vermouth, maraschino, and bitters in the lush predecessor to the Martini.","ingredients":["1 1/2 oz Hayman's Old Tom Gin","1 1/2 oz Martini & Rossi Sweet Vermouth","1/4 oz Luxardo Maraschino","2 dashes orange bitters"],"directions":"Stir with ice until very cold and strain into a chilled coupe or Nick & Nora. Garnish with an orange twist.","swaps":["Use Plymouth Sloe Gin for 1/4 oz of the gin for a fruitier Victorian","riff.","A tiny absinthe rinse adds beautiful lift."]},{"name":"Monkey Gland","desc":"Gin, orange juice, grenadine, and absinthe in a strange but delicious classic with a slight savory edge.","ingredients":["2 oz Aviation Gin","1 oz fresh orange juice","1/4 oz grenadine","1 dash absinthe"],"directions":"Shake hard with ice and strain into a chilled coupe. Garnish with an orange peel.","swaps":["Use The Botanist for a drier build.","Add 1 dash orange bitters to sharpen the citrus."]},{"name":"Clover Club","desc":"Gin, lemon, raspberry, and egg white shaken into one of the prettiest and best pre-prohibition sours.","ingredients":["2 oz Aviation Gin","3/4 oz fresh lemon juice","1/2 oz raspberry syrup","1 egg white"],"directions":"Dry shake, then shake again with ice until very frothy. Double strain into a chilled coupe and garnish with a raspberry or two drops of bitters on the foam.","swaps":["Use Hendrick's for a slightly softer floral build.","Add 1/4 oz dry vermouth if you want it more classic and structured."]},{"name":"White Lady","desc":"Gin, orange liqueur, lemon, and egg white in a razor-clean citrus sour with silky texture.","ingredients":["2 oz The Botanist Dry Gin","3/4 oz Cointreau","3/4 oz fresh lemon juice","1 egg white"],"directions":"Dry shake, then shake again with ice until frothy and cold. Double strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use Aviation for a slightly softer version.","A barspoon of simple syrup makes it more approachable."]},{"name":"Hanky Panky","desc":"Gin, sweet vermouth, and Fernet-Branca in a dark aromatic stirred drink with beautiful bitter lift.","ingredients":["1 1/2 oz The Botanist Dry Gin","1 1/2 oz Martini & Rossi Sweet Vermouth","1/4 oz Fernet-Branca"],"directions":"Stir with ice until very cold and strain into a chilled Nick & Nora. Garnish with an orange twist.","swaps":["Use rye instead of gin for a darker, stranger build.","A dash of orange bitters adds extra lift."]},{"name":"20th Century","desc":"Gin, cr\u00e8me de cacao, lemon, and Lillet-style aromatized wine in a surprising and elegant classic.","ingredients":["1 1/2 oz Aviation Gin","3/4 oz Cocchi Americano or Lillet Blanc","3/4 oz fresh lemon juice","1/2 oz Tempus Fugit Cr\u00e8me de Cacao"],"directions":"Shake hard with ice and strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use Grey Goose for a vodka version.","A dash of orange bitters keeps the cacao in check."]}]},{"spirit":"Vodka","drinks":[{"name":"French Martini","desc":"Grey Goose vodka, Chambord, and pineapple juice shaken silky and fruit-forward.","ingredients":["2 oz Grey Goose Vodka","1/2 oz Chambord","1 1/2 oz pineapple juice"],"directions":"Add all ingredients to a shaker with ice and shake until frothy and cold. Double strain into a chilled coupe glass. Garnish with a raspberry or expressed lemon peel.","swaps":["Use Belvedere Unfiltered for a richer mouthfeel.","Add 1/4 oz Giffard Pamplemousse for a brighter berry-citrus edge."]},{"name":"White Russian","desc":"Tito's vodka, Kahlua, and Irish cream served rich, smooth, and dessert-like over ice.","ingredients":["2 oz Tito's Vodka","1 oz Kahlua","1 oz Kavanagh Irish Cream"],"directions":"Add vodka and Kahlua to a rocks glass over fresh ice and stir briefly. Float the Irish cream on top or stir it in for a blended finish. Garnish with grated chocolate or a light dusting of cacao if desired.","swaps":["Use Mr Black in place of Kahlua for a less sweet coffee profile.","Substitute Screwball for the vodka to push it toward a peanut-butter","dessert drink."]},{"name":"Sea Breeze","desc":"Vodka with cranberry and grapefruit for a light, tart refresher.","ingredients":["1.5 oz vodka","3 oz cranberry juice","1 oz grapefruit juice"],"directions":"Build over ice in a highball glass and stir gently. Garnish Lime wedge. Swap / Alternate Swap: Add a splash of soda for a lighter version.","swaps":[]},{"name":"Cape Codder","desc":"Vodka and cranberry with a squeeze of lime.","ingredients":["1.5 oz vodka","4 oz cranberry juice","0.25 oz lime juice"],"directions":"Build over ice in a highball glass and stir gently. Garnish Lime wedge. Swap / Alternate Swap: Add grapefruit juice to turn it into a Sea Breeze.","swaps":[]},{"name":"Madras","desc":"Vodka, cranberry, and orange juice.","ingredients":["1.5 oz vodka","2 oz cranberry juice","2 oz orange juice"],"directions":"Build over ice in a highball glass and stir gently. Garnish Orange wedge. Swap / Alternate Swap: Add pineapple for a tropical twist.","swaps":[]},{"name":"Bay Breeze","desc":"Vodka with pineapple and cranberry juice.","ingredients":["1.5 oz vodka","2 oz pineapple juice","2 oz cranberry juice"],"directions":"Build over ice in a highball glass and stir. Garnish Pineapple wedge. Swap / Alternate Swap: Use rum instead of vodka.","swaps":[]},{"name":"Harvey Wallbanger","desc":"Vodka, orange juice, and Galliano.","ingredients":["1.5 oz vodka","4 oz orange juice","0.5 oz Galliano"],"directions":"Build vodka and orange juice over ice in a highball glass and float Galliano on top. Garnish Orange slice. Swap / Alternate Swap: Add a dash of orange bitters.","swaps":[]},{"name":"Sex on the Beach","desc":"Vodka, peach liqueur, cranberry, and orange juice.","ingredients":["1.5 oz vodka","0.5 oz peach schnapps","2 oz cranberry juice","2 oz orange juice"],"directions":"Build in a highball glass over ice and stir gently. Garnish Orange slice and cherry. Swap / Alternate Swap: Add pineapple juice.","swaps":[]},{"name":"Woo Woo","desc":"Vodka, peach schnapps, and cranberry.","ingredients":["1.5 oz vodka","0.5 oz peach schnapps","2 oz cranberry juice"],"directions":"Shake with ice and strain into a rocks glass over ice. Garnish Lime wedge. Swap / Alternate Swap: Add soda for a spritz version.","swaps":[]},{"name":"Screwdriver","desc":"Vodka and fresh orange juice.","ingredients":["2 oz vodka","4 oz orange juice"],"directions":"Build in a highball glass over ice and stir. Garnish Orange wedge. Swap / Alternate Swap: Add Galliano for Harvey Wallbanger.","swaps":[]},{"name":"Lemon Drop Martini","desc":"Vodka, lemon, and orange liqueur shaken bright and citrusy.","ingredients":["2 oz vodka","0.75 oz lemon juice","0.5 oz Cointreau","0.25 oz simple syrup"],"directions":"Shake with ice and strain into a chilled sugar-rimmed coupe. Garnish Lemon twist. Swap / Alternate Swap: Add raspberry syrup for a berry version.","swaps":[]},{"name":"Chocolate Martini","desc":"Vodka, chocolate liqueur, and cream.","ingredients":["1.5 oz vodka","1 oz chocolate liqueur","1 oz cream"],"directions":"Shake with ice and strain into a chilled martini glass. Garnish Chocolate shavings. Swap / Alternate Swap: Add Mr Black for mocha.","swaps":[]},{"name":"Black Russian","desc":"Vodka and coffee liqueur.","ingredients":["2 oz vodka","1 oz coffee liqueur"],"directions":"Build over ice in a rocks glass and stir. Garnish None. Swap / Alternate Swap: Add cola for a Colorado Bulldog style twist.","swaps":[]}]},{"spirit":"Rum","drinks":[{"name":"Daiquiri","desc":"Planteray 3 Stars rum, fresh lime, and simple syrup shaken crisp, dry, and sharply refreshing.","ingredients":["2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz simple syrup"],"directions":"Add rum, lime juice, and simple syrup to a shaker with ice. Shake hard for 10--12 seconds and fine strain into a chilled coupe glass. Garnish with a thin lime wheel or lime coin.","swaps":["Use Smith & Cross for a funkier Jamaican-style Daiquiri.","Use demerara syrup in place of simple for a richer finish.","Replace 1/4 oz of the simple syrup with orgeat for a nutty tiki edge.","Use 1/4 oz John D. Taylor Velvet Falernum in place of the simple for a","spiced Caribbean riff."]},{"name":"Mai Tai (Trader Vic 1944)","desc":"Smith & Cross and Planteray 3 Stars rum, lime, Cointreau, orgeat, and demerara in the original almond-citrus tiki classic.","ingredients":["1 oz Smith & Cross Rum","1 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz Cointreau","1/2 oz orgeat syrup","1/4 oz demerara syrup"],"directions":"Add all ingredients to a shaker with ice and shake hard until thoroughly chilled. Dump into a double rocks glass or tiki mug over crushed ice. Garnish with a mint sprig and a spent lime shell.","swaps":["Add 1/4 oz Chinola Pineapple for a brighter tropical accent.","Split in 1/2 oz Diplomatico if you want a rounder, richer Mai Tai."]},{"name":"Corn & Oil","desc":"Diplom\u00e1tico rum, John D. Taylor Velvet Falernum, and Angostura bitters served rich, spiced, and Caribbean-dark over ice.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","1/2 oz John D. Taylor Velvet Falernum","2 dashes Angostura aromatic bitters"],"directions":"Build the rum and falernum in a rocks glass over fresh ice and stir briefly to combine. Float the bitters over the top and garnish with a lime peel or lime wheel.","swaps":["Use Smith & Cross for a drier, funkier Jamaican version.","Add 1/4 oz fresh lime juice if you want a brighter, slightly longer","Corn & Oil."]},{"name":"Jungle Bird","desc":"Smith & Cross rum, Campari, pineapple, lime, and demerara in a bold tropical bitter classic.","ingredients":["1 1/2 oz Smith & Cross Rum","3/4 oz Campari","1 1/2 oz pineapple juice","1/2 oz fresh lime juice","1/2 oz demerara syrup"],"directions":"Add all ingredients to a shaker with ice. Shake until chilled and strain into a rocks glass over fresh ice. Garnish with a pineapple frond or pineapple wedge and a lime wheel.","swaps":["Use Diplomatico Reserva Exclusiva for a rounder, sweeter Jungle Bird.","Add 1/4 oz Chinola Pineapple for extra tropical lift.","Add 1/4 oz John D. Taylor Velvet Falernum for extra clove-ginger","spice."]},{"name":"El Presidente","desc":"Rum, dry vermouth, orange cura\u00e7ao, and grenadine in a polished Cuban stirred classic.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","3/4 oz Martini & Rossi Dry Vermouth","1/4 oz Cointreau","1 barspoon grenadine"],"directions":"Stir with ice until very cold and strain into a chilled coupe. Garnish with an orange twist.","swaps":["Use Diplomatico for a richer, softer version.","Add 1 dash orange bitters for more structure."]},{"name":"Mary Pickford","desc":"Rum, pineapple, maraschino, and grenadine in a bright old Hollywood tropical classic.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1 1/2 oz pineapple juice","1/4 oz Luxardo Maraschino","1 barspoon grenadine"],"directions":"Shake with ice until cold and strain into a chilled coupe. Garnish with a cherry.","swaps":["Use Stiggins' Fancy for a more pineapple-forward Mary Pickford.","A drop of saline keeps the fruit from getting too sweet."]},{"name":"Hotel Nacional Special","desc":"Rum, pineapple, lime, and apricot in a sleek Cuban tropical classic with dry fruit depth.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/2 oz apricot liqueur","1 oz pineapple juice","1/2 oz fresh lime juice","1/4 oz simple syrup"],"directions":"Shake with ice until cold and strain into a chilled coupe. Garnish with a lime wheel or pineapple leaf.","swaps":["Use Stiggins' Fancy for more pineapple character.","A dash of Angostura gives it extra vintage tiki feel."]}]},{"spirit":"Whiskey / Bourbon","drinks":[{"name":"Old Fashioned","desc":"Woodford Reserve bourbon, demerara syrup, and Angostura bitters stirred over a large cube with expressed orange oils.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add bourbon, demerara syrup, and bitters to a mixing glass with ice. Stir for 20--25 seconds until chilled and lightly diluted. Strain over a large clear cube in a double rocks glass. Express an orange peel over the surface, run it around the rim, and drop it in as garnish.","swaps":["For a spicier build, use Bulleit Rye and keep the same bitters ratio.","For a slightly richer finish, replace the orange bitters dash with 1","dash cherry bitters."]},{"name":"Manhattan","desc":"Bulleit Rye, sweet vermouth, and Angostura bitters stirred silky smooth with a classic orange-and-cherry profile.","ingredients":["2 oz Bulleit Rye","1 oz Martini & Rossi Sweet Vermouth","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add rye, sweet vermouth, and bitters to a mixing glass with ice. Stir until fully chilled. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or a Luxardo-style cherry.","swaps":["Use Woodford Reserve for a rounder bourbon Manhattan.","Add 1/4 oz Braastad Cognac for a richer, Vieux Carr\u00e9-style direction."]},{"name":"Boulevardier","desc":"Bulleit Bourbon, Campari, and sweet vermouth with deep orange bitterness and whiskey warmth.","ingredients":["1 1/2 oz Bulleit Bourbon","3/4 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1 dash orange bitters"],"directions":"Add bourbon, Campari, vermouth, and orange bitters to a mixing glass with ice. Stir until chilled and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Swap in Bulleit Rye for a leaner, spicier Boulevardier.","For a darker profile, split the vermouth with 1/4 oz Amaro Nonino."]},{"name":"Rob Roy","desc":"Balvenie 12, sweet vermouth, and Angostura bitters with a warm Scotch-driven finish.","ingredients":["2 oz The Balvenie 12 Single Malt Scotch","1 oz Martini & Rossi Sweet Vermouth","2 dashes Angostura aromatic bitters"],"directions":"Stir with ice until very cold and strain into a chilled coupe or Nick & Nora glass. Garnish with a cherry or expressed orange peel.","swaps":["Use Glenlivet 14 for a fruitier, lighter Rob Roy.","Add 1 dash orange bitters for more lift."]},{"name":"Amaro Boulevardier","desc":"Woodford Reserve, Campari, and Amaro Nonino with sweet vermouth in a richer, darker Boulevardier.","ingredients":["1 1/2 oz Woodford Reserve Bourbon","1/2 oz Campari","1/2 oz Amaro Nonino","1/2 oz Martini & Rossi Sweet Vermouth"],"directions":"Stir over ice until properly chilled. Strain over a large cube in a rocks glass. Garnish with a wide orange peel.","swaps":["Use rye in place of bourbon for a leaner build.","Add 1 dash orange bitters if you want the citrus to lead more","strongly."]},{"name":"Paper Plane","desc":"Bourbon, Aperol, Amaro Nonino, and lemon in a perfectly balanced modern craft classic.","ingredients":["3/4 oz Bulleit Bourbon","3/4 oz Aperol","3/4 oz Amaro Nonino","3/4 oz fresh lemon juice"],"directions":"Shake all ingredients with ice until very cold and double strain into a chilled coupe. Garnish with a lemon twist or tiny paper plane pick.","swaps":["Use bourbon and rye split for more edge.","A grapefruit peel makes the Aperol feel drier."]},{"name":"Grapefruit Boulevardier","desc":"Bourbon, Campari, and vermouth accented with grapefruit peel for a brighter Boulevardier.","ingredients":["1 oz bourbon","1 oz Campari","1 oz sweet vermouth","grapefruit peel"],"directions":"Stir with ice until chilled and strain over a large cube. Express grapefruit peel over drink.","swaps":["Use rye for a spicier version.","Add chocolate bitters for richness."]},{"name":"Vieux Carr\u00e9","desc":"Rye, cognac, vermouth, Benedictine, and bitters in a deep New Orleans classic with serious elegance.","ingredients":["1 oz Bulleit Rye","1 oz D'usse Cognac","1 oz Martini & Rossi Sweet Vermouth","1/4 oz DOM Benedictine","1 dash Angostura bitters","1 dash Peychaud's bitters"],"directions":"Stir with ice until very cold and strain into a rocks glass over a large cube or into a chilled Nick & Nora. Garnish with a lemon twist.","swaps":["If you don't buy Benedictine, use 1/4 oz honey syrup and 1 dash","orange bitters for a looser riff.","A cognac-heavy split gives it a richer finish."]},{"name":"Scofflaw","desc":"Rye, dry vermouth, lemon, grenadine, and bitters in a tart, bracing pre-prohibition whiskey sour.","ingredients":["2 oz Bulleit Rye","1 oz Martini & Rossi Dry Vermouth","3/4 oz fresh lemon juice","1/4 oz grenadine","1 dash orange bitters"],"directions":"Shake with ice and strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use sweet vermouth split with dry if you want a richer style.","A dash of absinthe pushes it into stranger territory."]},{"name":"Ward Eight","desc":"Bourbon, lemon, orange, and grenadine in a soft, bright American whiskey sour classic.","ingredients":["2 oz Woodford Reserve Bourbon","1/2 oz fresh lemon juice","1/2 oz fresh orange juice","1/4 oz grenadine"],"directions":"Shake hard with ice and strain into a chilled coupe or rocks glass over fresh ice. Garnish with an orange wedge and cherry.","swaps":["Use rye for a sharper, spicier build.","Add 1 dash Angostura for more backbone."]},{"name":"Brooklyn","desc":"Rye, dry vermouth, maraschino, and bitter amaro in a dry, elegant Manhattan cousin.","ingredients":["2 oz Bulleit Rye","1 oz Martini & Rossi Dry Vermouth","1/4 oz Luxardo Maraschino","1/4 oz Amer Picon substitute or Amaro Nonino"],"directions":"Stir with ice until properly chilled and strain into a Nick & Nora. Garnish with a lemon twist.","swaps":["Use a barspoon of Campari with Amaro Nonino to get closer to Amer","Picon bitterness.","Woodford makes it rounder and softer."]},{"name":"Blood & Sand","desc":"Scotch, sweet vermouth, cherry liqueur, and orange juice in one of the best oddball classics ever made.","ingredients":["3/4 oz Glenlivet 14","3/4 oz Martini & Rossi Sweet Vermouth","3/4 oz Cherry Heering or cherry liqueur","3/4 oz fresh orange juice"],"directions":"Shake with ice and strain into a chilled coupe. Garnish with an orange peel.","swaps":["Use Balvenie 12 for a rounder malt profile.","A dash of orange bitters tightens the fruit."]},{"name":"Remember the Maine","desc":"Rye, sweet vermouth, cherry liqueur, and absinthe in a dark, brooding Manhattan variant.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz cherry liqueur","1 dash absinthe"],"directions":"Stir with ice until very cold and strain into a chilled Nick & Nora. Garnish with a cherry or orange twist.","swaps":["Add 1 dash Angostura for a firmer backbone.","Use Woodford for a softer version."]},{"name":"La Louisiane","desc":"Rye, vermouth, Benedictine, absinthe, and bitters in a compact New Orleans sipper with serious depth.","ingredients":["1 1/2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz DOM Benedictine","1 dash absinthe","1 dash Peychaud's bitters","1 dash Angostura bitters"],"directions":"Stir with ice until very cold and strain into a chilled coupe or Nick & Nora. Garnish with a cherry.","swaps":["Use cognac split with rye for a Vieux Carr\u00e9-adjacent version.","If you skip Benedictine, add a barspoon of honey syrup plus orange","bitters."]},{"name":"Toronto","desc":"Whiskey, Fernet, sugar, and bitters in a dark, mentholated Old Fashioned-style classic.","ingredients":["2 oz Bulleit Rye","1/4 oz Fernet-Branca","1/4 oz simple syrup","2 dashes Angostura bitters"],"directions":"Stir with ice until very cold and strain into a rocks glass over a large cube. Garnish with an orange twist.","swaps":["Use bourbon for a gentler Toronto.","Add a dash of orange bitters to soften the Fernet.","# Modern Craft Classics"]}]},{"spirit":"Tequila / Mezcal","drinks":[{"name":"Tequila Sunrise","desc":"Tequila, orange juice, and grenadine layered into the iconic sunrise gradient.","ingredients":["2 oz tequila blanco","4 oz orange juice","0.5 oz grenadine"],"directions":"Add tequila and orange juice to a highball glass filled with ice. Slowly pour grenadine down the inside of the glass so it sinks and creates a layered sunrise effect. Garnish Orange slice and cherry. Swap / Alternate Swap: Add 0.25 oz lime juice for a brighter version.","swaps":[]}]},{"spirit":"Brandy / Cognac","drinks":[{"name":"Brandy Alexander","desc":"Cognac, cr\u00e8me de cacao, and cream.","ingredients":["1.5 oz cognac","1 oz cr\u00e8me de cacao","1 oz cream"],"directions":"Shake with ice and strain into a coupe. Garnish Fresh nutmeg. Swap / Alternate Swap: Use bourbon.","swaps":[]}]},{"spirit":"Other","drinks":[{"name":"Fuzzy Navel","desc":"Peach schnapps and orange juice.","ingredients":["1.5 oz peach schnapps","3 oz orange juice"],"directions":"Build in a highball glass over ice and stir. Garnish Orange slice. Swap / Alternate Swap: Add vodka for a Hairy Navel.","swaps":[]},{"name":"Grasshopper","desc":"Mint liqueur, cr\u00e8me de cacao, and cream.","ingredients":["1 oz cr\u00e8me de menthe","1 oz cr\u00e8me de cacao","1 oz cream"],"directions":"Shake with ice and strain into a chilled coupe. Garnish Mint leaf. Swap / Alternate Swap: Blend with ice for frozen version.","swaps":[]}]}],"drinks":[]},{"name":"Modern Craft Classics","subsections":[{"spirit":"Gin","drinks":[{"name":"Jasmine","desc":"Gin, Campari, Cointreau, and lemon in a bright pink modern classic that drinks like a bitter White Lady.","ingredients":["1 1/2 oz Aviation Gin","1/4 oz Campari","1/4 oz Cointreau","3/4 oz fresh lemon juice"],"directions":"Shake with ice and double strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use Aperol instead of Campari for a softer version.","The Botanist gives it a drier spine."]}]},{"spirit":"Rum","drinks":[{"name":"Airmail","desc":"Rum, lime, honey, and sparkling wine in a tropical French 75-style modern classic.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz honey syrup","2 oz Prosecco"],"directions":"Shake rum, lime, and honey with ice. Strain into a flute or coupe and top with prosecco. Garnish with a lime twist.","swaps":["Use Diplomatico for a richer, softer Airmail.","A little Angostura on top is classic and excellent."]},{"name":"Kingston Negroni","desc":"Jamaican rum, Campari, and sweet vermouth in a bold bitter-rum modern classic.","ingredients":["1 oz Smith & Cross Rum","1 oz Campari","1 oz Martini & Rossi Sweet Vermouth"],"directions":"Stir with ice until cold and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Use Diplomatico for a rounder, sweeter Kingston Negroni.","A dash of chocolate bitters makes it richer and darker."]},{"name":"Nuclear Daiquiri","desc":"Overproof rum, Chartreuse, falernum, and lime in a neon-bright daiquiri built for adventurous drinkers.","ingredients":["1 oz Wray & Nephew Overproof Rum","1 oz Green Chartreuse","1 oz John D. Taylor's Velvet Falernum","3/4 oz fresh lime juice"],"directions":"Shake very hard with ice and double strain into a chilled coupe. Garnish with a lime twist.","swaps":["Use 1/2 oz Chartreuse and 1/2 oz Chinola Pineapple for a softer","version.","A tiny absinthe rinse makes it even stranger."]}]},{"spirit":"Whiskey / Bourbon","drinks":[{"name":"Penicillin","desc":"Blended Scotch, lemon, honey-ginger syrup, and a smoky float of Islay --- soothing and dramatic at the same time.","ingredients":["2 oz Glenlivet 14","3/4 oz fresh lemon juice","3/4 oz honey-ginger syrup","1/4 oz peated Scotch or mezcal float"],"directions":"Shake all but the float with ice until chilled. Strain over fresh ice in a rocks glass and float the peated Scotch or mezcal on top. Garnish with candied ginger or a lemon peel.","swaps":["Use Balvenie 12 for a richer malt note.","A rosemary smoke cap makes this exceptionally good."]},{"name":"Little Italy","desc":"Rye, sweet vermouth, and Cynar in a rich, amaro-laced Manhattan cousin.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/2 oz Cynar"],"directions":"Stir with ice until cold and strain into a chilled Nick & Nora. Garnish with an orange peel.","swaps":["Use Amaro Nonino if you do not buy Cynar, though it will be softer","and less earthy.","A dash of orange bitters makes the citrus stand out."]},{"name":"Conference","desc":"A luxurious split-base modern classic with bourbon, rye, cognac, vermouth, bitters, and Benedictine.","ingredients":["1/2 oz Woodford Reserve Bourbon","1/2 oz Bulleit Rye","1/2 oz D'usse Cognac","1/2 oz Martini & Rossi Sweet Vermouth","1/4 oz DOM Benedictine","2 dashes Angostura bitters"],"directions":"Stir all ingredients with ice until fully chilled and strain into a chilled coupe or Nick & Nora. Garnish with a lemon twist.","swaps":["Use orange bitters with the Angostura for a brighter version.","A barspoon of Amaro Nonino adds extra herbal depth."]}]},{"spirit":"Tequila / Mezcal","drinks":[{"name":"Oaxaca Old Fashioned","desc":"Reposado tequila and mezcal stirred with agave and bitters for a smoky agave-driven Old Fashioned.","ingredients":["1 1/2 oz Casamigos Reposado","1/2 oz Mezcal Ilegal Joven","1/4 oz agave syrup","2 dashes Angostura bitters"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Garnish with a flamed orange peel.","swaps":["Use Altos Plata plus extra mezcal for a leaner build.","Add 1 dash orange bitters for more peel aroma."]},{"name":"Maximilian Affair","desc":"Mezcal, Aperol, lemon, honey, and sparkling wine in a smoky-modern riff that drinks like a desert French 75.","ingredients":["1 1/2 oz Mezcal Ilegal Joven","3/4 oz fresh lemon juice","1/2 oz Aperol","1/2 oz honey syrup","2 oz Prosecco"],"directions":"Shake all but the prosecco with ice and strain into a flute or coupe. Top with prosecco and garnish with a grapefruit peel.","swaps":["Use reposado tequila split with mezcal for a softer style.","Rosemary smoke over the top is excellent."]},{"name":"M&M","desc":"Mezcal and maraschino stirred together in the simplest possible smoky-sweet after-dinner sipper.","ingredients":["1 1/2 oz Mezcal Ilegal Joven","1/2 oz Luxardo Maraschino"],"directions":"Stir with ice until chilled and strain into a small coupe or Nick & Nora. Garnish with a grapefruit twist.","swaps":["Add 1 dash orange bitters for more lift.","A citrus-smoke rinse takes this from simple to dramatic.","# Weird & Experimental"]}]},{"spirit":"Amaro / Aperitivo","drinks":[{"name":"Bitter Giuseppe","desc":"Cynar, dry vermouth, lemon, and salt in an unexpectedly savory, low-proof modern aperitif.","ingredients":["2 oz Cynar","1 oz Martini & Rossi Dry Vermouth","1/4 oz fresh lemon juice","1 pinch sea salt"],"directions":"Shake very briefly with ice and strain into a chilled coupe. Garnish with a lemon twist or olive.","swaps":["Use Amaro Nonino if you don't buy Cynar for a fruitier style.","Add 1 dash celery bitters to push it greener."]}]}],"drinks":[]},{"name":"Sours","subsections":[{"spirit":"Gin","drinks":[{"name":"Indigo Citrus Fizz","desc":"Empress 1908 gin, lemon, honey syrup, and grapefruit bitters topped with soda for a vivid color-changing fizz.","ingredients":["2 oz Empress 1908 Indigo Gin","3/4 oz fresh lemon juice","1/2 oz honey syrup","2 dashes grapefruit bitters","2 oz club soda"],"directions":"Shake gin, lemon, honey, and bitters with ice. Strain into a Collins glass over fresh ice and top with club soda. Garnish with a lemon wheel and grapefruit peel.","swaps":["Swap honey syrup for simple for a crisper finish.","Use Hendrick's Neptunia for a less floral version."]},{"name":"The Salty Cucumber","desc":"Neptunia gin, lime, cucumber, celery bitters, and a silky salt foam for a bright coastal house cocktail.","ingredients":["2 oz Hendrick's Neptunia Gin","3/4 oz fresh lime juice","1/2 oz cucumber syrup","1/4 oz simple syrup","1 dash celery bitters","Salt Foam: 1 oz aquafaba, 1/4 tsp fine sea salt, 1/4 oz simple syrup"],"directions":"Shake gin, lime juice, cucumber syrup, simple syrup, and celery bitters with ice until chilled. Double strain into a chilled coupe. In a separate small jar or with a milk frother, whip the aquafaba, salt, and simple syrup until lightly foamy. Spoon the salt foam across the surface of the drink.","swaps":["Use The Botanist gin for a greener botanical profile. Replace half the","lime juice with yuzu juice for a brighter citrus lift."]},{"name":"Citrus Gin Fizz","desc":"Aviation gin, lemon, grapefruit, and simple syrup with a clean sparkling finish.","ingredients":["2 oz Aviation Gin","1/2 oz fresh lemon juice","1/2 oz grapefruit juice","1/2 oz simple syrup","2 oz club soda"],"directions":"Shake gin, citrus, and syrup with ice. Strain into a highball glass over fresh ice and top with club soda. Garnish with a lemon wheel.","swaps":["Add 1/4 oz St-Germain for a softer floral top note.","Include 1 egg white and dry shake for a silver fizz texture."]},{"name":"Citrus Neptunia Fizz","desc":"Hendrick's Neptunia with lemon, grapefruit, honey, and soda for a coastal citrus fizz.","ingredients":["2 oz Hendrick's Neptunia","1/2 oz fresh lemon juice","1/2 oz grapefruit juice","1/2 oz honey syrup","2 oz club soda"],"directions":"Shake gin, citrus, and honey with ice. Strain into a Collins glass over fresh ice, top with soda, and garnish with a lemon wheel and rosemary sprig.","swaps":["Substitute Hendrick's Oasium for a greener, more botanical build.","Add 1 dash celery bitters for a savory edge."]},{"name":"Yuzu Gin Sour","desc":"Botanist gin, yuzu, lemon, and simple syrup with a bright silky texture and aromatic citrus finish.","ingredients":["2 oz The Botanist Dry Gin","1/2 oz yuzu juice","1/2 oz fresh lemon juice","1/2 oz simple syrup","1 egg white"],"directions":"Dry shake all ingredients without ice, then add ice and shake again until frothy and cold. Double strain into a chilled coupe. Garnish with 2 dashes orange bitters across the foam.","swaps":["For more floral lift, add 1/4 oz St-Germain.","Use Empress 1908 for a visual purple sour."]},{"name":"Lemon Basil Gimlet","desc":"Aviation gin, basil syrup, lemon, and lime in a sharpened gimlet-style sour with fresh herbal lift.","ingredients":["2 oz Aviation Gin","1/2 oz fresh lime juice","1/2 oz fresh lemon juice","1/2 oz basil syrup"],"directions":"Shake all ingredients with ice until chilled. Double strain into a chilled coupe and garnish with a small basil leaf.","swaps":["Use Hendrick's Gin for a more cucumber-forward profile.","Add 1 dash lime bitters for a tighter citrus finish.","# Floral & Elegant"]},{"name":"Lavender French 75","desc":"The Botanist gin, lemon, lavender syrup, and prosecco in a floral sparkling sour.","ingredients":["1 1/2 oz The Botanist Dry Gin","1/2 oz fresh lemon juice","1/2 oz lavender syrup","2 1/2 oz Prosecco"],"directions":"Shake gin, lemon, and lavender syrup with ice. Strain into a flute or coupe and top with prosecco. Garnish with a lemon twist.","swaps":["Swap lavender syrup for honey syrup for a softer floral build.","Use Empress 1908 for a dramatic color shift."]},{"name":"Floral Gin Sour","desc":"Aviation gin, St-Germain, lemon, and egg white with a silky floral sour profile.","ingredients":["2 oz Aviation Gin","1/2 oz St-Germain","3/4 oz fresh lemon juice","1/4 oz simple syrup","1 egg white"],"directions":"Dry shake all ingredients, then shake again with ice until frothy and cold. Double strain into a chilled coupe. Garnish the foam with 2 drops orange bitters.","swaps":["Use Empress gin for a more dramatic presentation.","Replace simple with honey syrup for more body."]},{"name":"Rosemary Elderflower Fizz","desc":"Hendrick's gin, St-Germain, lemon, rosemary syrup, and soda with floral-herbal lift.","ingredients":["2 oz Hendrick's Gin","1/2 oz St-Germain","3/4 oz fresh lemon juice","1/4 oz rosemary syrup","2 oz club soda"],"directions":"Shake all but the soda with ice and strain into a Collins glass over fresh ice. Top with soda and garnish with a rosemary sprig and lemon wheel.","swaps":["Use Neptunia for a more maritime herbal note.","Add 1 dash grapefruit bitters for length."]},{"name":"Lavender Gin Fizz","desc":"Empress gin, lemon, lavender syrup, and soda in a floral fizz with vivid color and perfume.","ingredients":["2 oz Empress 1908 Indigo Gin","3/4 oz fresh lemon juice","1/2 oz lavender syrup","2 oz club soda"],"directions":"Shake gin, lemon, and lavender syrup with ice. Strain into a Collins glass over fresh ice, top with soda, and garnish with a lemon wheel.","swaps":["Use The Botanist for a less floral and more classic profile.","Add 1 egg white for a creamier fizz texture.","# Herbal & Botanical"]},{"name":"Basil Grapefruit Fizz","desc":"Hendrick's gin, grapefruit, basil syrup, and soda with juicy herbal lift.","ingredients":["2 oz Hendrick's Gin","1 oz grapefruit juice","1/2 oz basil syrup","1/4 oz fresh lime juice","2 oz club soda"],"directions":"Shake all but the soda with ice. Strain into a Collins glass over fresh ice, top with soda, and garnish with a basil sprig and grapefruit peel.","swaps":["Use vodka for a cleaner, lighter version.","Add 1 dash grapefruit bitters to intensify the fruit."]},{"name":"Smoked Garden Gimlet","desc":"Botanist gin, lime, basil syrup, and a touch of smoke for a savory-herbal showpiece sour.","ingredients":["2 oz The Botanist Dry Gin","3/4 oz fresh lime juice","1/2 oz basil syrup"],"directions":"Shake with ice until chilled and double strain into a coupe. Add a brief cap of rosemary or citrus smoke just before serving. Garnish with a basil leaf.","swaps":["Use Hendrick's Oasium for a greener profile.","Add 1 dash celery bitters for extra savory structure."]},{"name":"Blackberry Gin Bramble Fizz","desc":"Juicy blackberry and lemon layered with botanical gin and topped with soda.","ingredients":["2 oz The Botanist Gin","0.75 oz lemon juice","0.5 oz blackberry syrup","2 drops saline","club soda"],"directions":"Shake all but soda, strain into Collins over ice, top with soda. Garnish with blackberry.","swaps":["Add 0.25 oz Chambord for deeper berry flavor."]},{"name":"Cucumber Strawberry Gin Sour","desc":"Cucumber and strawberry meet crisp gin and citrus in a refreshing sour.","ingredients":["2 oz Hendrick's Gin","0.75 oz lemon","0.5 oz strawberry syrup","0.25 oz cucumber syrup","1 dash celery bitters"],"directions":"Shake and fine strain into coupe. Garnish cucumber ribbon.","swaps":["Add saline for savory lift."]},{"name":"Cherry Citrus Gin Sour","desc":"Cherry liqueur, lemon, and gin shaken into a bright sour with foam.","ingredients":["2 oz gin","0.5 oz Chambord","0.75 oz lemon","1 egg white"],"directions":"Dry shake then shake with ice. Fine strain into coupe.","swaps":["add dash cherry bitters."]},{"name":"Smoked Peach Gin Sour","desc":"Peach and lemon shaken with gin and finished with a light applewood smoke.","ingredients":["2 oz gin","0.5 oz peach liqueur","0.75 oz lemon","1 egg white"],"directions":"Shake and fine strain into coupe, smoke with cherry wood.","swaps":["pairing: thyme."]},{"name":"Blueberry Lavender Gin Fizz","desc":"Gin, blueberry, lemon, and lavender with a foamy top.","ingredients":["1.75 oz gin","0.5 oz blueberry syrup","0.5 oz lemon","1 egg white","soda"],"directions":"Dry shake then shake with ice, strain into Collins, top soda.","swaps":["peach bitters."]},{"name":"Garden Gin Fizz","desc":"Gin, lemon, basil syrup, and cucumber shaken into a bright garden fizz.","ingredients":["2 oz gin","0.75 oz lemon juice","0.5 oz basil syrup","1 egg white","club soda"],"directions":"Dry shake then shake with ice. Strain into Collins and top soda.","swaps":["add cucumber syrup."]},{"name":"Lavender Lemon Garden Sour","desc":"Gin with lemon and lavender syrup finished with silky foam.","ingredients":["2 oz gin","0.75 oz lemon","0.5 oz lavender syrup","1 egg white"],"directions":"Dry shake then shake with ice and fine strain.","swaps":["add grapefruit bitters."]},{"name":"Strawberry Thyme Gin Sour","desc":"Strawberry and thyme paired with gin and citrus in a refreshing sour.","ingredients":["2 oz gin","0.5 oz strawberry syrup","0.75 oz lemon","0.25 oz thyme syrup"],"directions":"Shake and strain into coupe.","swaps":["add egg white for foam."]},{"name":"Frozen Blueberry Gin Fizz","desc":"Frozen blueberry gin cocktail with citrus and light foam.","ingredients":["2 oz gin","0.5 oz blueberry syrup","0.5 oz lemon","1 egg white","1 cup ice"],"directions":"Blend briefly then shake to foam and strain into coupe.","swaps":["vodka base."]},{"name":"Tomato Gin Fizz","desc":"Bright gin, fresh tomato water, lemon, and basil finished with soda for a savory garden fizz.","ingredients":["2 oz gin","1 oz tomato water","0.75 oz lemon","0.25 oz basil syrup","club soda"],"directions":"Shake first ingredients, strain into Collins, top soda.","swaps":["add celery bitters."]},{"name":"Thyme Lemon Gin Sour","desc":"Gin, lemon, thyme syrup, and foam.","ingredients":["2 oz gin","0.75 oz lemon","0.5 oz thyme syrup","1 egg white"],"directions":"Dry shake then shake with ice.","swaps":["add saline."]},{"name":"Lavender Garden Fizz","desc":"Gin, lavender syrup, lemon, and soda.","ingredients":["2 oz gin","0.5 oz lavender syrup","0.75 oz lemon","club soda"],"directions":"Shake and strain then top soda.","swaps":["add foam."]},{"name":"Cranberry Gin Fizz","desc":"Gin, cranberry, lemon, and soda.","ingredients":["2 oz gin","1 oz cranberry juice","0.75 oz lemon","soda"],"directions":"Shake and top soda.","swaps":["rosemary garnish."]},{"name":"Botanical Grapefruit Fizz","desc":"Gin, citrus, and grapefruit bitters finished with soda.","ingredients":["1.5 oz gin","1/2 oz lemon juice","1/2 oz grapefruit juice","1/2 oz simple syrup","1 dash grapefruit bitters","2 drops saline","club soda"],"directions":"Shake everything except soda. Strain into a Collins glass over ice and top with soda. Garnish Lemon wheel. Swap / Alternate Swap: Use Italicus for part of the gin.","swaps":[]},{"name":"Citrus Layer Sour","desc":"Layered citrus sour combining lemon, grapefruit, and yuzu.","ingredients":["1 1/2 oz gin","1/2 oz grapefruit juice","1/2 oz lemon juice","1/4 oz yuzu juice","1/2 oz simple syrup","1 egg white or Fee Foam"],"directions":"Dry shake, then shake again with ice and double strain into a chilled coupe.","swaps":["Swap tequila for a brighter agave version."]},{"name":"Yuzu Grapefruit Gin Sour","desc":"A silky gin sour with yuzu, grapefruit, lemon, and aromatic bitters.","ingredients":["2 oz gin","1/2 oz yuzu juice","1/2 oz grapefruit juice","1/2 oz lemon juice","1/2 oz simple syrup","1 egg white or Fee Foam"],"directions":"Dry shake then shake with ice. Double strain into a chilled coupe.","swaps":["Add grapefruit bitters."]},{"name":"Toasted Bergamot Sour","desc":"Gin or vodka with Italicus and toasted almond bitters.","ingredients":["2 oz gin or vodka","1/2 oz Italicus","3/4 oz lemon juice","1/4 oz simple syrup","1 dash toasted almond bitters"],"directions":"Shake with ice and strain into a coupe.","swaps":["Add egg white."]},{"name":"Tropical Chambord Fizz","desc":"Gin or vodka with berry, pineapple, citrus, and soda.","ingredients":["1 1/2 oz gin or vodka","1/2 oz Chambord","1/2 oz pineapple juice","1/2 oz lemon juice","1/4 oz simple syrup","club soda"],"directions":"Shake all but soda with ice and strain into a Collins glass over ice. Top with soda.","swaps":["Add passionfruit liqueur."]},{"name":"Summer Peach Sour","desc":"Peach liqueur and citrus shaken into a silky sour.","ingredients":["1 1/2 oz gin or vodka","3/4 oz peach liqueur","3/4 oz lemon juice","1/4 oz simple syrup","1 egg white or Fee Foam"],"directions":"Dry shake then shake with ice and double strain into a coupe.","swaps":["Add grapefruit bitters."]}]},{"spirit":"Vodka","drinks":[{"name":"Espresso Martini","desc":"Grey Goose vodka, Mr Black, fresh espresso, and simple syrup shaken into a thick caf\u00e9-style foam.","ingredients":["1 1/2 oz Grey Goose Vodka","1 oz Mr Black Coffee Liqueur","1 oz fresh espresso","1/4 oz simple syrup"],"directions":"Add all ingredients to a shaker with plenty of ice and shake very hard until the tin is frosty. Double strain into a chilled coupe or martini glass. Garnish with three coffee beans.","swaps":["Use Absolut Vanilla for a sweeter, latte-style version.","Add 1/4 oz Tempus Fugit Cr\u00e8me de Cacao for a mocha variation.","# Bright & Citrus"]},{"name":"Lemon Elderflower Fizz","desc":"Belvedere Unfiltered vodka, lemon, elderflower, and soda with a soft floral finish.","ingredients":["2 oz Belvedere Unfiltered Vodka","3/4 oz fresh lemon juice","1/2 oz St-Germain","1/4 oz simple syrup","2 oz club soda"],"directions":"Shake vodka, lemon, St-Germain, and simple with ice. Strain into a Collins glass over fresh ice and top with club soda. Garnish with a lemon twist.","swaps":["Swap vodka for Aviation gin to move it toward a floral Collins.","Add 1 dash grapefruit bitters for extra lift."]},{"name":"Yuzu Tropical Fizz","desc":"Grey Goose vodka, yuzu, pineapple, and soda with tropical fruit and crisp citrus lift.","ingredients":["1 1/2 oz Grey Goose Vodka","1/2 oz yuzu juice","1 oz pineapple juice","1/4 oz simple syrup","2 oz club soda"],"directions":"Shake all but the soda with ice. Strain into a Collins glass over fresh ice, top with club soda, and garnish with a lemon wheel.","swaps":["Use gin for a more aromatic tropical fizz.","Add 1/4 oz Chinola Passionfruit for extra depth."]},{"name":"Yuzu Strawberry Fizz","desc":"Strawberry and yuzu citrus topped with soda for a refreshing fizz.","ingredients":["1.5 oz vodka","0.5 oz Choya Yuzu","0.5 oz strawberry syrup","soda"],"directions":"Shake first ingredients, strain over ice in Collins, top soda.","swaps":["add saline."]},{"name":"Watermelon Elderflower Sour","desc":"Vodka, elderflower, watermelon, and lemon with silky foam.","ingredients":["1.5 oz vodka","0.5 oz St\u2011Germain","0.75 oz lemon","1 oz watermelon juice","1 egg white"],"directions":"Dry shake then shake with ice, fine strain.","swaps":["gin base."]},{"name":"Mint Lime Vodka Fizz","desc":"Vodka, lime, mint syrup, and soda for a crisp summer fizz.","ingredients":["2 oz vodka","0.75 oz lime","0.25 oz mint syrup","club soda"],"directions":"Shake and strain into Collins and top soda.","swaps":["gin base."]},{"name":"Holiday Pomegranate Sour","desc":"Vodka, pomegranate, lemon, and foam.","ingredients":["2 oz vodka","1 oz pomegranate juice","0.75 oz lemon","1 egg white"],"directions":"Dry shake then shake with ice.","swaps":["add orange bitters."]},{"name":"Bergamot Citrus Cloud","desc":"Vodka, Italicus, citrus, and foam in a soft floral sour.","ingredients":["1 1/2 oz vodka","1/2 oz Italicus","3/4 oz lemon juice","1/4 oz simple syrup","1 egg white"],"directions":"Dry shake then shake with ice and double strain into a coupe.","swaps":["Add orange blossom water."]},{"name":"Midori Citrus Fizz","desc":"Vodka, melon liqueur, citrus, and soda for a playful refresher.","ingredients":["1 1/2 oz vodka","1/2 oz Midori","1/2 oz lemon juice","1/2 oz grapefruit juice","1/4 oz simple syrup","club soda"],"directions":"Shake everything except soda with ice and strain into a Collins glass over ice. Top with soda.","swaps":["Add yuzu for more aroma."]}]},{"spirit":"Rum","drinks":[{"name":"Tropical Elderflower Sour","desc":"Pineapple rum, elderflower, passionfruit, and lime with silky foam.","ingredients":["1 1/2 oz pineapple rum","1/2 oz elderflower liqueur","1/2 oz passionfruit liqueur","1/2 oz lime juice","1 egg white"],"directions":"Dry shake then shake with ice and double strain into a coupe.","swaps":["Add pineapple juice."]}]},{"spirit":"Whiskey / Bourbon","drinks":[{"name":"Amaro Sour","desc":"Amaro Nonino, bourbon, lemon, honey, and egg white with bittersweet depth and velvety foam.","ingredients":["1 1/2 oz Amaro Nonino","1/2 oz Woodford Reserve Bourbon","3/4 oz fresh lemon juice","1/2 oz honey syrup","1 egg white"],"directions":"Dry shake all ingredients, then shake again with ice until frothy and chilled. Double strain into a coupe. Garnish with 2 dashes Angostura across the foam.","swaps":["Use rye in place of bourbon for a sharper backbone.","Add 1 dash orange bitters to brighten the finish."]},{"name":"Whiskey Sour","desc":"The classic bourbon sour of whiskey, lemon, sugar, and optional foam that turns dark spirit into a bright citrus cocktail.","ingredients":["2 oz bourbon","3/4 oz fresh lemon juice","3/4 oz simple syrup","1 egg white or Fee Foam (optional)"],"directions":"Dry shake ingredients if using egg white. Add ice and shake again until very cold. Double strain into a chilled coupe or serve over fresh ice.","swaps":["Add 2 dashes Angostura bitters for extra depth.","Replace simple syrup with honey syrup for a Gold Rush style","variation."]},{"name":"Bourbon Yuzu Sour","desc":"Bourbon, yuzu, and simple syrup shaken into a vivid citrus sour with Japanese citrus lift.","ingredients":["2 oz bourbon","3/4 oz yuzu juice","1/2 oz simple syrup","1 egg white (optional)"],"directions":"Dry shake if using egg white. Add ice, shake again, and double strain into a coupe.","swaps":["Add grapefruit bitters for aroma.","Use lemon if yuzu is unavailable."]},{"name":"Maple Cinnamon Whiskey Sour","desc":"Whiskey, maple syrup, cinnamon, and lemon with foam.","ingredients":["2 oz whiskey","0.75 oz lemon","0.5 oz maple syrup","1 egg white"],"directions":"Dry shake then shake with ice.","swaps":["add cinnamon bitters."]},{"name":"Trinidad Sour","desc":"An infamous modern classic built around Angostura bitters, rye, lemon, and orgeat --- intense but unexpectedly balanced.","ingredients":["1 1/2 oz Angostura bitters","1/2 oz Bulleit Rye","3/4 oz fresh lemon juice","1 oz orgeat syrup"],"directions":"Shake very hard with ice and double strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use 1 oz Angostura and 1/2 oz Amaro Nonino for a slightly softer","version.","A tiny pinch of sea salt helps the orgeat pop."]},{"name":"Monte Cassino","desc":"Rye, Benedictine, Chartreuse, and lemon in a surprisingly vivid herbal modern sour.","ingredients":["3/4 oz rye whiskey","3/4 oz DOM Benedictine","3/4 oz Yellow Chartreuse","3/4 oz fresh lemon juice"],"directions":"Shake with ice until cold and double strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use Green Chartreuse in a smaller amount if that's the version you","buy.","A dash of orange bitters brightens the honey-herb notes."]}]},{"spirit":"Tequila / Mezcal","drinks":[{"name":"Raspberry Lime Cloud Margarita","desc":"Tequila, raspberry, and lime finished with silky egg\u2011white foam.","ingredients":["2 oz tequila blanco","0.75 oz lime","0.5 oz raspberry syrup","1 egg white"],"directions":"Dry shake then shake with ice. Fine strain into coupe.","swaps":["Add 0.25 oz Cointreau."]},{"name":"Salty Citrus Paloma Sour","desc":"Tequila, grapefruit, lemon, and saline in a bright sour-style Paloma.","ingredients":["1.5 oz tequila","1/2 oz grapefruit juice","3/4 oz lemon juice","1/2 oz simple syrup","2 drops saline","1 dash grapefruit bitters"],"directions":"Shake with ice and strain over fresh ice in a rocks glass. Garnish Grapefruit peel. Swap / Alternate Swap: Add egg white or Fee Foam for a creamy texture.","swaps":[]},{"name":"Citrus Paloma Fizz","desc":"Tequila with blended citrus topped with sparkling soda.","ingredients":["2 oz tequila blanco","1 oz grapefruit juice","1/2 oz lemon juice","1/4 oz yuzu juice","1/4 oz simple syrup","club soda"],"directions":"Shake everything except soda with ice. Strain into a Collins glass over ice and top with soda.","swaps":["Add 2 drops saline to brighten."]},{"name":"Bergamot Paloma Sour","desc":"Tequila and Italicus with grapefruit and lemon in a floral Paloma riff.","ingredients":["1 1/2 oz tequila","1/2 oz Italicus","1 oz grapefruit juice","1/2 oz lemon juice","1/4 oz simple syrup"],"directions":"Shake with ice and strain into a coupe.","swaps":["Add egg white."]},{"name":"Division Bell","desc":"Mezcal, Aperol, maraschino, and lime in a smoky, bittersweet modern sour with huge personality.","ingredients":["1 oz Mezcal Ilegal Joven","3/4 oz Aperol","1/4 oz Luxardo Maraschino","3/4 oz fresh lime juice"],"directions":"Shake hard with ice and double strain into a chilled coupe. Garnish with a grapefruit peel.","swaps":["Add 1/4 oz Choya Yuzu for extra lift.","Use Cointreau instead of maraschino for a cleaner citrus line."]}]},{"spirit":"Amaro / Aperitivo","drinks":[{"name":"Amaretto Sour (Modern)","desc":"Disaronno, lemon, and egg white shaken into a silky, balanced sour.","ingredients":["1.5 oz Disaronno","0.75 oz lemon juice","0.25 oz simple syrup","1 egg white","1 dash Angostura bitters"],"directions":"Dry shake without ice, then shake with ice until well chilled. Strain into a rocks glass over fresh ice. Garnish Lemon twist and cherry. Swap / Alternate Swap: Add 0.5 oz bourbon for a richer version.","swaps":[]}]}],"drinks":[]},{"name":"Highballs & Collins","subsections":[{"spirit":"Gin","drinks":[{"name":"Yuzu Collins","desc":"The Botanist gin, yuzu, lemon, and simple syrup topped with soda in a crisp Japanese-inspired Collins.","ingredients":["2 oz The Botanist Dry Gin","1/2 oz yuzu juice","1/2 oz fresh lemon juice","1/2 oz simple syrup","2 oz club soda"],"directions":"Shake gin, yuzu, lemon, and simple with ice. Strain into a Collins glass over fresh ice and top with soda. Garnish with a lemon wheel and mint sprig.","swaps":["Use Hendrick's Neptunia for a brighter, seaside version.","Add 1 dash orange bitters for a more perfumed finish."]},{"name":"Bergamot Collins","desc":"The Botanist gin, Italicus, lemon, and soda in a long bergamot-driven Collins.","ingredients":["1 1/2 oz The Botanist Dry Gin","3/4 oz fresh lemon juice","1/2 oz Italicus","1/4 oz simple syrup","2 oz club soda"],"directions":"Shake gin, lemon, Italicus, and simple with ice. Strain into a Collins glass over fresh ice and top with soda. Garnish with a lemon wheel.","swaps":["Use Hendrick's Neptunia for a brighter citrus-sea-spray profile.","Add 1 dash orange bitters for extra bergamot lift."]},{"name":"Herbal Collins","desc":"Hendrick's gin, lemon, rosemary syrup, and soda in a long refreshing herb-led Collins.","ingredients":["2 oz Hendrick's Gin","3/4 oz fresh lemon juice","1/2 oz rosemary syrup","2 oz club soda"],"directions":"Shake gin, lemon, and rosemary syrup with ice. Strain into a Collins glass over fresh ice and top with soda. Garnish with a rosemary sprig and lemon wheel.","swaps":["Use basil syrup for a greener Collins.","Add 1 dash celery bitters for a drier finish."]},{"name":"Rosemary Gin Highball","desc":"The Botanist gin, rosemary syrup, lemon, and soda in a tall, aromatic herbal cooler.","ingredients":["2 oz The Botanist Dry Gin","1/2 oz fresh lemon juice","1/2 oz rosemary syrup","2 1/2 oz club soda"],"directions":"Build over ice in a highball glass, stirring once after topping with soda. Garnish with a rosemary sprig and lemon peel.","swaps":["Use Neptunia for more saline-sea brightness.","Add 1 dash orange bitters for warmth."]},{"name":"Pineapple Collins","desc":"Aviation gin, pineapple, lemon, and simple syrup topped with soda for a bright tropical Collins.","ingredients":["2 oz Aviation Gin","1 oz pineapple juice","1/2 oz fresh lemon juice","1/4 oz simple syrup","2 oz club soda"],"directions":"Shake gin, pineapple, lemon, and syrup with ice. Strain into a Collins glass over fresh ice, top with soda, and garnish with a pineapple wedge.","swaps":["Use vodka for a cleaner fruit-led Collins.","Add 1 dash grapefruit bitters for a drier finish."]},{"name":"Salty Cucumber Collins","desc":"Gin, cucumber syrup, lime, and saline lifted with soda.","ingredients":["1.5 oz Hendrick's Neptunia Gin","0.5 oz cucumber syrup","0.75 oz lime","2 drops saline","soda"],"directions":"Shake and strain into Collins, top soda.","swaps":["celery bitters."]},{"name":"Basil Grapefruit Collins","desc":"Gin, grapefruit juice, basil syrup, and soda.","ingredients":["2 oz gin","0.75 oz grapefruit juice","0.25 oz basil syrup","club soda"],"directions":"Shake and strain into Collins then top soda.","swaps":["vodka base."]},{"name":"Garden Collins","desc":"Gin, lemon, basil, and cucumber topped with soda.","ingredients":["2 oz gin","0.75 oz lemon","0.5 oz basil syrup","club soda"],"directions":"Shake and strain into Collins, top soda.","swaps":["add cucumber."]},{"name":"Peach Basil Summer Cooler","desc":"Gin, peach liqueur, grapefruit, and citrus topped with soda.","ingredients":["1 1/2 oz gin","3/4 oz peach liqueur","1 oz grapefruit juice","1/2 oz lemon juice","3 basil leaves","club soda"],"directions":"Muddle basil lightly with lemon juice. Shake remaining ingredients except soda with ice and strain over ice. Top with soda.","swaps":["Use vodka for softer version."]},{"name":"Peach Grapefruit Cooler","desc":"Gin or vodka with peach and ruby grapefruit over ice.","ingredients":["1 1/2 oz gin or vodka","3/4 oz peach liqueur","1 oz ruby red grapefruit juice","1/2 oz lemon juice","club soda"],"directions":"Shake all but soda with ice and strain into a highball over ice. Top with soda.","swaps":["Add basil."]}]},{"spirit":"Vodka","drinks":[{"name":"Keith's Grapefruit Highball","desc":"A clean, bright, bitter-citrus highball built around grapefruit, premium vodka, and aperitivo lift.","ingredients":["2 oz Grey Goose Vodka","2 oz fresh grapefruit juice","1/2 oz Giffard Pamplemousse","2 oz club soda","1 drop saline"],"directions":"Build in a highball glass over fresh ice and stir gently. Garnish with a wide grapefruit peel.","swaps":["Use Ketel One Citroen for a brighter citrus-led version.","Add 1 dash grapefruit bitters for a drier finish."]},{"name":"Salty Dog Highball","desc":"Tito's vodka, fresh grapefruit juice, saline, and soda in a long, bracing citrus highball.","ingredients":["2 oz Tito's Vodka","2 1/2 oz grapefruit juice","1 drop 20% saline","1 oz club soda"],"directions":"Build vodka, grapefruit juice, and saline in a highball glass over ice. Top with club soda and stir gently. Garnish with a grapefruit wedge and a light salt rim if desired.","swaps":["Use The Botanist gin to turn it into a gin Salty Dog.","Add 1 dash grapefruit bitters for extra structure."]},{"name":"Grapefruit Vodka Highball","desc":"Grey Goose vodka, grapefruit juice, pamplemousse liqueur, and soda in a long bright aperitif-style cooler.","ingredients":["2 oz Grey Goose Vodka","2 oz grapefruit juice","1/2 oz Giffard Pamplemousse","1 oz club soda"],"directions":"Build in a highball glass over ice, stirring gently to combine. Garnish with a grapefruit wedge and expressed lemon peel.","swaps":["Use Ketel One Citroen for extra citrus definition.","Add 1 drop saline to make the grapefruit pop."]},{"name":"Melon Breeze","desc":"Grey Goose vodka, Midori, lemon, and soda for a bright melon-citrus cooler.","ingredients":["1 1/2 oz Grey Goose Vodka","3/4 oz Midori Melon Liqueur","1/2 oz fresh lemon juice","2 oz club soda"],"directions":"Shake vodka, Midori, and lemon with ice. Strain into a highball glass over fresh ice and top with soda. Garnish with a lemon wheel or mint sprig.","swaps":["Add 1/4 oz Choya Yuzu for a sharper citrus line.","Use gin instead of vodka for a more botanical melon cooler."]},{"name":"Blueberry Lemon Collins","desc":"Vodka, blueberry syrup, and lemon lifted with sparkling soda  3 Stars Rum","1/2 oz fresh lime juice","1/2 oz grapefruit juice","1/4 oz Giffard Pamplemousse","1/4 oz simple syrup"],"directions":"Add all ingredients to a shaker with ice. Shake hard until thoroughly chilled and fine strain into a chilled coupe. Garnish with a lime wheel or lime coin.","swaps":["Use Smith & Cross for a bolder grapefruit-funk combination.","Add 1 dash grapefruit bitters for extra dryness."]},{"name":"Spiced Daiquiri","desc":"Rum, lime, demerara, honey, and Angostura for a lightly spiced, warmer Daiquiri variation.","ingredients":["2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/4 oz demerara syrup","1/4 oz honey syrup","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a shaker with ice. Shake hard until thoroughly chilled and fine strain into a chilled coupe. Garnish with a lime wheel or lime coin.","swaps":["Split the base with Smith & Cross for more depth.","Add 1 dash habanero bitters if you want actual heat."]},{"name":"Melon Daiquiri","desc":"White rum, Midori, lime, and simple syrup in a melon-bright Daiquiri variation.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/2 oz Midori Melon Liqueur","3/4 oz fresh lime juice","1/4 oz simple syrup"],"directions":"Add all ingredients to a shaker with ice. Shake hard until thoroughly chilled and fine strain into a chilled coupe. Garnish with a lime wheel or lime coin.","swaps":["Add 1/4 oz yuzu juice for more brightness.","Use vodka split with rum for a cleaner melon profile."]},{"name":"Coconut Daiquiri","desc":"White rum, Malibu, lime, and simple syrup for a coconut-leaning beach-style Daiquiri.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/2 oz Malibu Rum","3/4 oz fresh lime juice","1/4 oz simple syrup"],"directions":"Add all ingredients to a shaker with ice. Shake hard until thoroughly chilled and fine strain into a chilled coupe. Garnish with a lime wheel or lime coin.","swaps":["Add 1/4 oz Chinola Pineapple for a pi\u00f1a-style direction.","Use demerar nto a chilled coupe. Garnish the foam with a lime wheel or 2 drops bitters.","swaps":["Add 1 dash Angostura on the foam for aroma.","Use demerara syrup for a fuller texture.","# Palomas"]}]},{"name":"Old Fashioneds","subsections":[],"drinks":[{"name":"Smoked Old Fashioned","desc":"Woodford Reserve, demerara syrup, and bitters smoked with oak or citrus wood for a dramatic classic.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice and stir until chilled. Strain over a large clear cube in a double rocks glass. Express an orange peel over the drink, then trap smoke from the smoking gun in the glass before serving.","swaps":["Use Bulleit Rye for a drier, spicier smoke profile.","Replace orange bitters with peach bitters for a softer fruit finish."]},{"name":"Chocolate Orange Old Fashioned","desc":"Bulleit Bourbon, demerara, chocolate bitters, and orange bitters with a rich cocoa-citrus finish.","ingredients":["2 oz Bulleit Bourbon","1/4 oz demerara syrup","2 dashes Aztec Chocolate Bitters","1 dash orange bitters"],"directions":"Stir all ingredients with ice until very cold. Strain over a large cube in a rocks glass. Garnish with an expressed orange peel and, if desired, a light shaving of dark chocolate.","swaps":["Use Woodford Reserve for a richer chocolate note.","Add 1/4 oz Tempus Fugit Cr\u00e8me de Cacao for a dessert-leaning version."]},{"name":"Diplomatico Old Fashioned","desc":"Diplom\u00e1tico Reserva Exclusiva, demerara, orange bitters, and chocolate bitters in a lush rum Old Fashioned.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","1/4 oz demerara syrup","2 dashes orange bitters","1 dash Aztec Chocolate Bitters"],"directions":"Stir all ingredients with ice and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Add 1 barspoon Frangelico for a nutty holiday variation.","Use cherry bitters instead of chocolate bitters for a fruitier rum","build."]},{"name":"Cacao Old Fashioned","desc":"Woodford Reserve, cr\u00e8me de cacao, demerara, and chocolate bitters in a whiskey-forward dessert Old Fashioned.","ingredients":["1 3/4 oz Woodford Reserve Bourbon","1/4 oz Tempus Fugit Cr\u00e8me de Cacao","1 tsp demerara syrup","2 dashes Aztec Chocolate Bitters"],"directions":"Stir all ingredients with ice and strain over a large cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use Bulleit Rye for more spice against the cacao.","Add 1 dash orange bitters to sharpen the finish."]},{"name":"Pineapple Old Fashioned","desc":"Bourbon and pineapple rum layered with demerara and bitters for a tropical-leaning Old Fashioned.","ingredients":["1 1/2 oz Woodford Reserve Bourbon","1/2 oz Planteray Stiggins' Fancy Pineapple Rum","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Garnish with a pineapple frond and orange peel.","swaps":["Use Diplomatico in place of bourbon for a full rum version.","Add 1 dash peach bitters for a softer tropical top note."]},{"name":"Mezcal Old Fashioned","desc":"Ilegal Joven mezcal, demerara syrup, and bitters with smoke built directly into the glass.","ingredients":["2 oz Mezcal Ilegal Joven","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Stir all ingredients with ice until chilled. Strain over a large cube in a rocks glass. Garnish with a flamed orange peel.","swaps":["Split the base with 1 oz tequila for a softer mezcal profile.","Add 1 dash habanero bitters for smoky heat."]},{"name":"Honey Old Fashioned","desc":"Bulleit Bourbon, honey syrup, and bitters with a rounded softer sweetness and orange-spice finish.","ingredients":["2 oz Bulleit Bourbon","1/4 oz honey syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Add 1 dash peach bitters for a warm honey-peach finish.","Use rye if you want more spice against the honey."]},{"name":"Orange Bitters Old Fashioned","desc":"Woodford Reserve, demerara, and a heavy hand of orange bitters for a brighter, more citrus-led Old Fashioned.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","3 dashes orange bitters","1 dash Angostura aromatic bitters"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Garnish with a thick orange peel.","swaps":["Add 1/4 oz Grand Marnier for a richer orange version.","Use rye and grapefruit bitters for a drier citrus finish.","# Tropical & Fruity"]},{"name":"Classic Old Fashioned","desc":"Woodford Reserve, demerara syrup, and bitters stirred over a large cube with expressed orange oils.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use Bulleit Rye for a spicier version.","Use a lemon twist instead of orange if you want it brighter."]},{"name":"Chocolate Old Fashioned","desc":"Bulleit bourbon, demerara, chocolate bitters, and orange bitters with a rich cocoa-citrus finish.","ingredients":["2 oz Bulleit Bourbon","1/4 oz demerara syrup","2 dashes Aztec Chocolate Bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Add 1/4 oz cr\u00e8me de cacao for a sweeter dessert profile.","Use Woodford Reserve if you want more roundness."]},{"name":"Peach Old Fashioned","desc":"Woodford Reserve, peach liqueur, demerara, and peach bitters with orchard fruit woven into the whiskey.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","1/4 oz Giffard P\u00eache de Vigne","2 dashes peach bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Add 1 dash Angostura for more spice.","Use rye if you want the peach to read brighter and drier."]},{"name":"Cherry Old Fashioned","desc":"Woodford Reserve, Luxardo maraschino, demerara, and cherry bitters for a fruit-kissed Old Fashioned.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","1/4 oz Luxardo Maraschino","2 dashes cherry bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use orange bitters alongside cherry bitters to brighten it.","Add 1 dash Angostura to make it read less sweet."]},{"name":"Coffee Old Fashioned","desc":"Bulleit Rye, Mr Black, demerara, and bitters in a dry coffee-spiked Old Fashioned.","ingredients":["2 oz Bulleit Rye","1/4 oz demerara syrup","1/4 oz Mr Black Coffee Liqueur","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use Kahlua for a sweeter coffee version.","Add 1 dash chocolate bitters for mocha depth."]},{"name":"Citrus Old Fashioned","desc":"Woodford Reserve, demerara, orange bitters, and grapefruit bitters with a bright peel-driven finish.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","2 dashes orange bitters","1 dash grapefruit bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Express both orange and grapefruit peels over the glass.","Use rye if you want the citrus to cut harder through the whiskey."]},{"name":"Banana Old Fashioned","desc":"Bulleit bourbon, banana liqueur, demerara, and bitters for a playful tropical Old Fashioned variation.","ingredients":["2 oz Bulleit Bourbon","1/4 oz demerara syrup","1/4 oz Giffard Banane du Br\u00e9sil","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Add 1 dash chocolate bitters for a banana-cacao profile.","Use rum in place of bourbon for an even more tropical build."]},{"name":"Amaro Old Fashioned","desc":"Bourbon, Amaro Nonino, demerara, and bitters in a darker, bittersweet Old Fashioned riff.","ingredients":["1 1/2 oz Woodford Reserve Bourbon","1/2 oz Amaro Nonino","1 tsp demerara syrup","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use rye to sharpen the bitter edges.","Add orange bitters if you want more citrus on the nose."]},{"name":"Rum Old Fashioned","desc":"Diplom\u00e1tico rum, demerara, and bitters for a lush rum Old Fashioned with orange warmth.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","1/4 oz demerara syrup","2 dashes orange bitters","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use Stiggins' Fanc
