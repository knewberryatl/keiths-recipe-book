l","1/2 oz Green Chartreuse","1 whole egg","1/4 oz simple syrup"],"directions":"Dry shake all ingredients hard, then shake again with ice until creamy and cold. Double strain into a coupe and garnish with grated nutmeg.","swaps":["Use cognac instead of rum for a more Alexander-like profile.","A dash of chocolate bitters makes it richer.","# Showstoppers"]}]},{"name":"Garden & Summer","subsections":[],"drinks":[{"name":"Watermelon Mint Paloma","desc":"Tequila, fresh watermelon, grapefruit, and mint for a vibrant summer Paloma.","ingredients":["2 oz Espolon Tequila Blanco","1 oz watermelon juice","0.5 oz grapefruit juice","0.5 oz lime","mint"],"directions":"Shake and strain into rocks glass over ice. Garnish with mint.","swaps":["Add 0.25 oz St\u2011Germain for floral note."]},{"name":"Grapefruit Rosemary Spritz","desc":"Gin, grapefruit, rosemary syrup, and prosecco in a bright herbaceous spritz.","ingredients":["1.5 oz gin","0.75 oz grapefruit juice","0.25 oz rosemary syrup","prosecco"],"directions":"Shake first ingredients lightly, strain into wine glass with ice, top prosecco.","swaps":["Add 0.25 oz Aperol."]},{"name":"Smoked Pineapple Paloma","desc":"Lightly smoked tequila with pineapple, grapefruit, and lime.","ingredients":["2 oz tequila","0.5 oz pineapple juice","0.75 oz grapefruit juice","0.5 oz lime"],"directions":"Shake, strain over ice in rocks glass, smoke with applewood. Garnish pineapple.","swaps":["applewood; herb: rosemary."]},{"name":"Salty Berry Daiquiri","desc":"Mixed berry rum daiquiri with a hint of saline to amplify fruit.","ingredients":["2 oz rum","0.75 oz lime","0.5 oz mixed berry syrup","2 drops saline"],"directions":"Shake hard and fine strain into coupe.","swaps":["use Chinola passionfruit for tropical twist."]},{"name":"Passionfruit Berry Margarita","desc":"Tequila, passionfruit, and raspberry in a vibrant tropical margarita.","ingredients":["1.5 oz tequila","0.5 oz Chinola passionfruit","0.5 oz raspberry syrup","0.75 oz lime"],"directions":"Shake and strain into coupe.","swaps":["add dash habanero bitters for heat."]},{"name":"Lemon Basil Vodka Spritz","desc":"Vodka, basil, lemon, and prosecco for a crisp garden spritz.","ingredients":["1.5 oz vodka","0.5 oz lemon","0.25 oz basil syrup","prosecco"],"directions":"Shake lightly then top with prosecco in wine glass.","swaps":["use gin."]},{"name":"Citrus Garden Gimlet","desc":"Gin, lime, basil syrup, and grapefruit bitters.","ingredients":["2 oz gin","0.75 oz lime","0.25 oz basil syrup","dash grapefruit bitters"],"directions":"Shake and strain into coupe.","swaps":["add cucumber syrup."]},{"name":"Smoked Berry Margarita","desc":"Tequila, blackberry, lime, and a hint of smoke.","ingredients":["2 oz tequila","0.5 oz blackberry syrup","0.75 oz lime"],"directions":"Shake and strain over ice in rocks glass, smoke with oak.","swaps":["pairing: basil."]},{"name":"Lime Berry Daiquiri","desc":"Rum, lime, and raspberry shaken bright and crisp.","ingredients":["2 oz rum","0.75 oz lime","0.5 oz raspberry syrup"],"directions":"Shake and strain into coupe.","swaps":["add maraschino."]},{"name":"Strawberry Yuzu Margarita","desc":"Tequila, strawberry, yuzu, and lime in a vivid citrus margarita.","ingredients":["2 oz tequila","0.5 oz Choya Yuzu","0.5 oz strawberry syrup","0.75 oz lime"],"directions":"Shake and strain into coupe.","swaps":["add saline."]},{"name":"Peach Grapefruit Paloma","desc":"Tequila with peach and grapefruit in a summer Paloma riff.","ingredients":["1.5 oz tequila","0.5 oz Giffard Peche de Vigne","0.75 oz grapefruit juice","0.5 oz lime","soda"],"directions":"Shake first ingredients, strain into Collins over ice, top soda.","swaps":["add saline."]},{"name":"Frozen Strawberry Basil Margarita","desc":"Bright tequila margarita blended with fresh strawberries and basil for a refreshing frozen patio drink.","ingredients":["2 oz tequila blanco","1 oz strawberry syrup","0.75 oz lime juice","4 basil leaves","1 cup ice"],"directions":"Blend all ingredients until smooth. Serve in a margarita glass. Garnish with basil leaf.","swaps":["Add 0.25 oz Cointreau for extra citrus."]},{"name":"Rosemary Grapefruit Gin Spritz","desc":"Botanical gin with grapefruit and rosemary lifted with prosecco.","ingredients":["1.5 oz gin","0.75 oz grapefruit juice","0.25 oz rosemary syrup","prosecco"],"directions":"Shake lightly then top with prosecco in wine glass.","swaps":["add 0.25 oz Aperol."]},{"name":"Frozen Pineapple Yuzu Daiquiri","desc":"Rum blended with pineapple, yuzu, and lime into a tropical frozen daiquiri.","ingredients":["2 oz rum","1 oz pineapple juice","0.5 oz Choya Yuzu","0.75 oz lime","1 cup ice"],"directions":"Blend until smooth and serve in coupe.","swaps":["add Chinola passionfruit."]},{"name":"Watermelon Basil Spritz","desc":"Fresh watermelon and basil with vodka and sparkling wine.","ingredients":["1.5 oz vodka","1 oz watermelon juice","0.25 oz basil syrup","prosecco"],"directions":"Shake lightly then top prosecco.","swaps":["gin base."]},{"name":"Smoked Rosemary Paloma","desc":"Tequila, grapefruit, lime, and rosemary lightly smoked for aromatic depth.","ingredients":["2 oz tequila","0.75 oz grapefruit juice","0.5 oz lime","0.25 oz rosemary syrup"],"directions":"Shake and strain over ice then smoke with rosemary and oak.","swaps":["pairing: oak; herb: rosemary."]},{"name":"Frozen Peach Margarita","desc":"Blended tequila margarita with ripe peach and citrus.","ingredients":["2 oz tequila","1 oz peach puree","0.75 oz lime","1 cup ice"],"directions":"Blend and serve in margarita glass.","swaps":["add Italicus."]},{"name":"Cucumber Elderflower Spritz","desc":"Gin, cucumber, St\u2011Germain, and prosecco in a floral garden spritz.","ingredients":["1.5 oz gin","0.5 oz St\u2011Germain","0.5 oz cucumber syrup","prosecco"],"directions":"Build in wine glass over ice and stir gently.","swaps":["vodka base."]},{"name":"Frozen Passionfruit Paloma","desc":"Tequila blended with grapefruit, passionfruit, and lime.","ingredients":["2 oz tequila","0.5 oz Chinola passionfruit","0.75 oz grapefruit","0.5 oz lime","1 cup ice"],"directions":"Blend until smooth and serve.","swaps":["add saline."]},{"name":"Garden Berry Spritz","desc":"Mixed berry syrup, lemon, vodka, and prosecco.","ingredients":["1 oz vodka","0.5 oz berry syrup","0.5 oz lemon","prosecco"],"directions":"Shake lightly and top with prosecco.","swaps":["gin base."]},{"name":"Frozen Watermelon Daiquiri","desc":"Rum blended with watermelon and lime.","ingredients":["2 oz rum","1 oz watermelon juice","0.75 oz lime","1 cup ice"],"directions":"Blend until smooth and serve.","swaps":["add mint."]},{"name":"Cucumber Lime Margarita","desc":"Tequila with cucumber syrup and lime for a fresh margarita riff.","ingredients":["2 oz tequila","0.5 oz cucumber syrup","0.75 oz lime"],"directions":"Shake and strain into coupe.","swaps":["add saline."]},{"name":"Thyme Peach Spritz","desc":"Peach liqueur, thyme syrup, and prosecco.","ingredients":["1 oz peach liqueur","0.25 oz thyme syrup","prosecco"],"directions":"Build over ice in wine glass.","swaps":["add gin."]},{"name":"Garden Lemon Spritz","desc":"Vodka, lemon, basil syrup, and sparkling wine.","ingredients":["1 oz vodka","0.75 oz lemon","0.25 oz basil syrup","prosecco"],"directions":"Shake lightly and top with prosecco.","swaps":["gin base."]},{"name":"Strawberry Mint Daiquiri","desc":"Rum, strawberry syrup, mint, and lime shaken bright and crisp.","ingredients":["2 oz rum","0.5 oz strawberry syrup","0.75 oz lime","mint"],"directions":"Shake hard and strain into coupe.","swaps":["add saline."]},{"name":"Basil Gimlet","desc":"Gin, lime, and basil syrup for a crisp herbal gimlet.","ingredients":["2 oz gin","0.75 oz lime","0.5 oz basil syrup"],"directions":"Shake and strain into coupe.","swaps":["add cucumber syrup."]},{"name":"Strawberry Campari Spritz","desc":"Strawberry and Campari with prosecco and citrus.","ingredients":["1 oz Campari","0.5 oz strawberry syrup","3 oz prosecco"],"directions":"Build in wine glass over ice.","swaps":["add gin."]},{"name":"Cucumber Martini","desc":"Vodka, dry vermouth, and cucumber essence in a crisp martini.","ingredients":["2 oz vodka","0.5 oz dry vermouth","0.25 oz cucumber syrup"],"directions":"Stir with ice and strain into coupe.","swaps":["gin base."]},{"name":"Herb Negroni","desc":"Gin, Campari, vermouth, and rosemary.","ingredients":["1 oz gin","1 oz Campari","1 oz sweet vermouth","rosemary"],"directions":"Stir with ice and strain over large cube.","swaps":["smoke with rosemary."]},{"name":"Mint Garden Margarita","desc":"Tequila, lime, mint syrup, and citrus bitters.","ingredients":["2 oz tequila","0.75 oz lime","0.25 oz mint syrup"],"directions":"Shake and strain into coupe.","swaps":["add grapefruit bitters."]},{"name":"Cucumber Elderflower Gimlet","desc":"Gin, St\u2011Germain, lime, and cucumber.","ingredients":["2 oz gin","0.5 oz St\u2011Germain","0.75 oz lime","0.25 oz cucumber syrup"],"directions":"Shake and strain.","swaps":["vodka base."]},{"name":"Rosemary Grapefruit Spritz","desc":"Gin, grapefruit juice, rosemary syrup, and prosecco.","ingredients":["1.5 oz gin","0.75 oz grapefruit juice","0.25 oz rosemary syrup","prosecco"],"directions":"Shake lightly and top prosecco.","swaps":["Aperol."]}]},{"name":"Fall & Holiday","subsections":[],"drinks":[{"name":"Spiced Apple Old Fashioned","desc":"Bourbon, apple brandy, and fall spices.","ingredients":["2 oz bourbon","0.5 oz apple brandy","0.25 oz maple syrup","2 dashes Angostura"],"directions":"Stir with ice and strain over large cube.","swaps":["smoke with cinnamon."]},{"name":"Cranberry Orange Spritz","desc":"Vodka, cranberry, orange, and prosecco.","ingredients":["1.5 oz vodka","1 oz cranberry juice","0.5 oz orange","prosecco"],"directions":"Shake lightly then top prosecco.","swaps":["add Aperol."]},{"name":"Pumpkin Spice Espresso Martini","desc":"Vodka, coffee liqueur, pumpkin spice.","ingredients":["1.5 oz vodka","1 oz coffee liqueur","0.5 oz espresso","0.25 oz pumpkin syrup"],"directions":"Shake hard and strain.","swaps":["vanilla vodka."]},{"name":"Apple Cider Margarita","desc":"Tequila with apple cider and lime.","ingredients":["2 oz tequila","1 oz apple cider","0.75 oz lime"],"directions":"Shake and strain into rocks glass.","swaps":["cinnamon rim."]},{"name":"Winter Rosemary Negroni","desc":"Gin, Campari, vermouth, and rosemary smoke.","ingredients":["1 oz gin","1 oz Campari","1 oz sweet vermouth","rosemary"],"directions":"Stir and smoke with rosemary.","swaps":["mezcal."]},{"name":"Gingerbread Rum Flip","desc":"Dark rum, spice syrup, and egg.","ingredients":["2 oz dark rum","0.5 oz spice syrup","1 whole egg"],"directions":"Shake hard and strain.","swaps":["add nutmeg."]},{"name":"Hot Buttered Rum","desc":"Warm rum drink with butter and spice.","ingredients":["2 oz rum","1 tsp butter","0.5 oz brown sugar","hot water"],"directions":"Stir until dissolved.","swaps":["cinnamon stick."]},{"name":"Spiced Pear Martini","desc":"Vodka, pear liqueur, and cinnamon.","ingredients":["2 oz vodka","0.5 oz pear liqueur","0.25 oz cinnamon syrup"],"directions":"Shake and strain.","swaps":["add lemon."]}]},{"name":"Advanced Techniques","subsections":[],"drinks":[{"name":"Ramos Gin Fizz","desc":"The grand show-off fizz: gin, citrus, cream, orange flower water, egg white, and soda with towering foam.","ingredients":["1 1/2 oz The Botanist Dry Gin","1/2 oz fresh lemon juice","1/2 oz fresh lime juice","3/4 oz simple syrup","1 oz cream","1 egg white","3 drops orange flower water","2 oz club soda"],"directions":"Dry shake all ingredients except soda for 20 seconds. Add ice and shake again for at least 20 seconds more. Strain into a chilled Collins glass without ice and let it settle for 20 to 30 seconds, then slowly top with soda to lift the foam above the rim. Garnish with a lime wheel or leave clean.","swaps":["Add 1/2 oz Chinola Passionfruit for a tropical Ramos riff.","A tiny absinthe rinse turns it weird in a very good way."]},{"name":"Clarified Milk Punch","desc":"Crystal-clear milk punch built from spirit, citrus, tea, sugar, and milk for a silky, shelf-stable party drink.","ingredients":["2 oz spirit of choice","3/4 oz citrus juice","1/2 oz sweetener","2 oz strong tea","2 oz whole milk"],"directions":"Build the cocktail without the milk. Pour the whole milk into a bowl, then slowly pour the mixed cocktail into the milk while stirring gently. Let curdle for 20 to 30 minutes. Strain first through a fine mesh sieve, then pass through coffee filters until the liquid is clear. Bottle and chill. Serve over a large cube or straight from the fridge in a small rocks glass. Garnish with a citrus peel.","swaps":["Rum and black tea make a rich classic build; bourbon and chamomile","make a softer version.","Do not reverse the order --- always pour the cocktail into the milk","for the cleanest curdling."]},{"name":"Rapid-Infused Martini","desc":"A martini built from quickly infused spirit, ideal for herbs, tea, citrus peels, or savory experiments.","ingredients":["2 1/2 oz infused gin or vodka","1/2 oz dry vermouth","1 dash orange bitters"],"directions":"For a rapid infusion, combine the spirit with the chosen herb, tea, or peel for 20 to 30 minutes, tasting as you go, then strain. Stir the finished martini with ice until very cold and strain into a chilled martini glass. Garnish to match the infusion.","swaps":["Rosemary, basil, lemon peel, cucumber, and chamomile all work very","well.","A vacuum infusion is faster if you have the equipment, but a short","steep is enough for home use."]},{"name":"Whipped Cream Sour","desc":"A rich sour finished with softly whipped cream for a dessert-bar presentation and layered texture.","ingredients":["2 oz base spirit","3/4 oz fresh lemon juice","1/2 oz sweetener","1 egg white","1 oz lightly whipped cream"],"directions":"Dry shake the spirit, lemon, sweetener, and egg white, then shake again with ice until cold. Double strain into a chilled coupe and gently spoon lightly whipped cream over the top. Garnish with citrus zest or grated spice.","swaps":["Rum with honey and nutmeg works beautifully.","Coffee liqueur plus bourbon makes a very good dessert version."]},{"name":"Clarified Pi\u00f1a Colada","desc":"A polished, crystal-clear version of the tropical classic that keeps the coconut-pineapple profile without the heaviness.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/2 oz Stiggins' Fancy Pineapple Rum","1 1/2 oz pineapple juice","3/4 oz coconut milk","1/2 oz fresh lime juice","2 oz whole milk"],"directions":"Build the cocktail without the whole milk and stir until smooth. Pour the whole milk into a bowl, then slowly add the cocktail and allow it to curdle for at least 20 minutes. Filter repeatedly through coffee filters until clear. Chill and serve over a large cube or up in a chilled coupe. Garnish with a pineapple leaf.","swaps":["Add 1/4 oz Chinola Pineapple for more fruit intensity.","A drop of saline makes the clarified coconut taste more vivid."]},{"name":"Milk Clarified Rum Punch","desc":"A party-ready clarified rum punch that pours clear but tastes round, tropical, and deeply layered.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","1 oz strong black tea","1/2 oz fresh lemon juice","1/2 oz demerara syrup","1/4 oz falernum","2 oz whole milk"],"directions":"Combine all ingredients except the whole milk. Pour the milk into a bowl, then add the mixed cocktail slowly so it curdles. Let rest for 20 to 30 minutes, then strain through a sieve and finally through coffee filters until clear. Bottle and chill. Serve over a large cube in a rocks glass. Garnish with a lemon peel.","swaps":["Use Smith & Cross split with Diplomatico for a funkier punch.","A dash of Angostura before clarification adds extra depth."]},{"name":"Layered Espresso Flip","desc":"A rich two-texture after-dinner drink with a shaken coffee flip under a light cream cap.","ingredients":["1 oz Mr Black Coffee Liqueur","1 oz Grey Goose Vodka","3/4 oz fresh espresso","1 whole egg","1/4 oz simple syrup","1 oz lightly whipped cream"],"directions":"Dry shake everything except the whipped cream until fully emulsified, then shake again with ice. Double strain into a coupe and spoon lightly whipped cream over the top. Garnish with grated chocolate or cocoa.","swaps":["Add 1/4 oz cr\u00e8me de cacao for mocha depth.","Use vanilla vodka for a sweeter caf\u00e9-style profile."]},{"name":"Cold-Draft Absinthe Fizz","desc":"An absinthe-led fizz with citrus, egg white, and soda that drinks like a ghostly herbal cloud.","ingredients":["1 oz absinthe","1 oz The Botanist Dry Gin","3/4 oz fresh lemon juice","1/2 oz simple syrup","1 egg white","2 oz club soda"],"directions":"Dry shake all ingredients except soda, then shake again with ice until very frothy. Strain into a chilled Collins glass and top with soda so the foam rises. Garnish with a lemon wheel.","swaps":["Use 1/2 oz absinthe and 1/2 oz St-Germain if you want it softer.","A mint garnish cools the nose nicely.","# Punch & Party"]}]}];

const allDrinks = [];
SECTIONS.forEach(function(sec) {
  if (sec.subsections && sec.subsections.length) {
    sec.subsections.forEach(function(sub) {
      sub.drinks.forEach(function(d) {
        allDrinks.push({
          name: d.name, desc: d.desc, section: sec.name, spirit: sub.spirit,
          ingredients: d.ingredients, directions: d.directions, swaps: d.swaps
        });
      });
    });
  } else {
    sec.drinks.forEach(function(d) {
      allDrinks.push({
        name: d.name, desc: d.desc, section: sec.name, spirit: null,
        ingredients: d.ingredients, directions: d.directions, swaps: d.swaps
      });
    });
  }
});

document.getElementById('totalCount').textContent = allDrinks.length + ' recipes';

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q || !text) return esc(text || '');
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

function drinkRowHTML(d, showSection) {
  var html = '<div class="drink-row" onclick="openRecipe(' + "'" + esc(d.name) + "'" + ')">';
  html += '<div style="flex:1;">';
  html += '<div class="drink-row-name">' + esc(d.name) + '</div>';
  if (d.desc) html += '<div class="drink-row-desc">' + esc(d.desc) + '</div>';
  if (showSection) html += '<div class="drink-row-section">' + esc(d.section) + '</div>';
  html += '</div>';
  html += '<div class="drink-row-arrow">&#8250;</div>';
  html += '</div>';
  return html;
}

function drinkRowSearchHTML(d, q) {
  var html = '<div class="drink-row" onclick="openRecipe(' + "'" + esc(d.name) + "'" + ')">';
  html += '<div style="flex:1;">';
  html += '<div class="drink-row-name">' + highlight(d.name, q) + '</div>';
  if (d.desc) html += '<div class="drink-row-desc">' + highlight(d.desc, q) + '</div>';
  html += '<div class="drink-row-section">' + esc(d.section) + '</div>';
  html += '</div>';
  html += '<div class="drink-row-arrow">&#8250;</div>';
  html += '</div>';
  return html;
}

var SPIRIT_ORDER = ['Gin','Vodka','Rum','Whiskey / Bourbon','Tequila / Mezcal','Brandy / Cognac','Amaro / Aperitivo','Liqueur','Other'];

function buildSectionBody(sec, spiritFilter) {
  var html = '';
  if (sec.subsections && sec.subsections.length) {
    sec.subsections.forEach(function(sub) {
      if (spiritFilter !== 'all' && sub.spirit !== spiritFilter) return;
      if (spiritFilter === 'all') {
        html += '<div class="spirit-label">' + esc(sub.spirit) + '</div>';
      }
      sub.drinks.forEach(function(d) { html += drinkRowHTML(d, false); });
    });
  } else {
    var drinks = sec.drinks;
    if (spiritFilter !== 'all') {
      drinks = allDrinks.filter(function(d) { return d.section === sec.name && d.spirit === spiritFilter; });
    }
    drinks.forEach(function(d) { html += drinkRowHTML(d, false); });
  }
  return html;
}

function countVisible(sec, spiritFilter) {
  if (spiritFilter === 'all') {
    if (sec.subsections && sec.subsections.length) {
      return sec.subsections.reduce(function(a,s) { return a + s.drinks.length; }, 0);
    }
    return sec.drinks.length;
  }
  if (sec.subsections && sec.subsections.length) {
    var n = 0;
    sec.subsections.forEach(function(sub) { if (sub.spirit === spiritFilter) n += sub.drinks.length; });
    return n;
  }
  return allDrinks.filter(function(d) { return d.section === sec.name && d.spirit === spiritFilter; }).length;
}

function renderSections(spiritFilter) {
  var el = document.getElementById('sectionsEl');
  var html = '';
  SECTIONS.forEach(function(sec) {
    var count = countVisible(sec, spiritFilter);
    if (count === 0 && spiritFilter !== 'all') return;
    html += '<div class="section">';
    html += '<button class="section-toggle" onclick="toggleSection(this)">';
    html += '<span class="section-name">' + esc(sec.name) + '</span>';
    html += '<span class="section-meta">';
    html += '<span class="section-count">' + count + ' recipes</span>';
    html += '<span class="section-chevron">&#9660;</span>';
    html += '</span></button>';
    html += '<div class="section-body">' + buildSectionBody(sec, spiritFilter) + '</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function openRecipe(name) {
  var drink = null;
  for (var i = 0; i < allDrinks.length; i++) {
    if (allDrinks[i].name === name) { drink = allDrinks[i]; break; }
  }
  if (!drink) return;

  var body = document.getElementById('overlayBody');
  var html = '';
  html += '<div class="recipe-name">' + esc(drink.name) + '</div>';
  if (drink.desc) html += '<div class="recipe-desc">' + esc(drink.desc) + '</div>';

  if (drink.ingredients && drink.ingredients.length) {
    html += '<div class="recipe-block">';
    html += '<div class="recipe-block-label">Ingredients</div>';
    html += '<ul class="ingredient-list">';
    drink.ingredients.forEach(function(ing) {
      html += '<li>' + esc(ing) + '</li>';
    });
    html += '</ul></div>';
  }

  if (drink.directions) {
    html += '<div class="recipe-block">';
    html += '<div class="recipe-block-label">Directions</div>';
    html += '<div class="directions-text">' + esc(drink.directions) + '</div>';
    html += '</div>';
  }

  if (drink.swaps && drink.swaps.length) {
    html += '<div class="recipe-block">';
    html += '<div class="recipe-block-label">Swaps &amp; Alternatives</div>';
    html += '<ul class="swap-list">';
    drink.swaps.forEach(function(s) {
      html += '<li>' + esc(s) + '</li>';
    });
    html += '</ul></div>';
  }

  if (!drink.ingredients && !drink.directions) {
    html += '<div class="no-recipe">No recipe on file yet.</div>';
  }

  document.getElementById('overlaySectionLabel').textContent = drink.section;
  body.innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeRecipe() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderSearch(q, spiritFilter) {
  var res = document.getElementById('searchResults');
  var sec = document.getElementById('sectionsEl');
  if (!q && spiritFilter === 'all') {
    res.style.display = 'none';
    sec.style.display = '';
    return;
  }
  sec.style.display = 'none';
  res.style.display = '';
  var matches = allDrinks;
  if (spiritFilter !== 'all') {
    matches = matches.filter(function(d) { return d.spirit === spiritFilter; });
  }
  if (q) {
    matches = matches.filter(function(d) {
      return d.name.toLowerCase().indexOf(q) !== -1 ||
             (d.desc && d.desc.toLowerCase().indexOf(q) !== -1) ||
             (d.ingredients && d.ingredients.join(' ').toLowerCase().indexOf(q) !== -1);
    });
  }
  if (!matches.length) {
    res.innerHTML = '<div class="search-empty">No recipes found.</div>';
    return;
  }
  var html = '<div class="search-header-bar">' + matches.length + ' recipe' + (matches.length !== 1 ? 's' : '') + ' found</div>';
  html += '<div class="search-list">';
  matches.forEach(function(d) { html += drinkRowSearchHTML(d, q); });
  html += '</div>';
  res.innerHTML = html;
}

var currentSpirit = 'all';
var searchTimer;

document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function() {
    var q = val.trim().toLowerCase();
    if (q || currentSpirit !== 'all') {
      renderSearch(q, currentSpirit);
    } else {
      document.getElementById('searchResults').style.display = 'none';
      document.getElementById('sectionsEl').style.display = '';
    }
  }, 180);
});

document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest ? e.target.closest('.filter-btn') : null;
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentSpirit = btn.getAttribute('data-spirit');
  var q = document.getElementById('search').value.trim().toLowerCase();
  if (q || currentSpirit !== 'all') {
    renderSearch(q, currentSpirit);
  } else {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('sectionsEl').style.display = '';
    renderSections(currentSpirit);
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeRecipe();
});

renderSections('all');
</script>
</body>
</html>
