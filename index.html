y split with the rum for a tropical edge.","Add chocolate bitters for extra depth."]},{"name":"Yuzu Old Fashioned","desc":"Bulleit Rye, Choya Yuzu, demerara, and orange bitters in a bright Japanese-citrus Old Fashioned.","ingredients":["2 oz Bulleit Rye","1 tsp demerara syrup","1/4 oz Choya Yuzu","2 dashes orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use bourbon for a softer yuzu expression.","Add grapefruit bitters if you want the citrus sharper."]},{"name":"Spiced Old Fashioned","desc":"Woodford Reserve, demerara, Angostura, and habanero bitters with warm spice and a gentle kick.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash habanero bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use orange bitters instead of habanero if you want spice without","heat.","Flame the orange peel for a warmer aromatic top note."]},{"name":"Velvet Old Fashioned","desc":"Woodford Reserve, Frangelico, demerara, and chocolate bitters for a smoother, rounded velvet-style Old Fashioned.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","1/4 oz Frangelico","1 dash Aztec Chocolate Bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir for 20--25 seconds until chilled and diluted. Strain over a large clear cube in a double rocks glass. Garnish with an orange peel.","swaps":["Use Screwball for part of the bourbon if you want it nuttier and","sweeter.","Add orange bitters to brighten the nutty finish.","# Manhattans"]}]},{"name":"Manhattans","subsections":[],"drinks":[{"name":"Black Manhattan","desc":"Bulleit Rye, Amaro Nonino, sweet vermouth, and bitters in a dark bittersweet Manhattan riff.","ingredients":["2 oz Bulleit Rye","3/4 oz Amaro Nonino","1/4 oz Martini & Rossi Sweet Vermouth","2 dashes Angostura aromatic bitters"],"directions":"Stir with ice until well chilled. Strain into a chilled Nick & Nora glass and garnish with an orange twist or cherry.","swaps":["Use full 1 oz Amaro Nonino and omit vermouth for a more amaro-forward","build.","Add 1 dash orange bitters to brighten the top."]},{"name":"Applejack Manhattan","desc":"Laird's Applejack, sweet vermouth, and aromatic bitters with warm apple and spice character.","ingredients":["2 oz Laird's Applejack","1 oz Martini & Rossi Sweet Vermouth","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Stir with ice until chilled and strain into a Nick & Nora glass. Garnish with an orange twist or cherry.","swaps":["Split the base with 1 oz rye for more structure.","Add 1/4 oz honey syrup if you want a rounder orchard profile."]},{"name":"Coffee Manhattan","desc":"Bulleit Rye, sweet vermouth, Mr Black, and aromatic bitters for a dry after-dinner Manhattan.","ingredients":["1 3/4 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Mr Black Coffee Liqueur","2 dashes Angostura aromatic bitters"],"directions":"Stir all ingredients with ice until chilled. Strain into a chilled Nick & Nora glass and garnish with an expressed orange peel.","swaps":["Use Kahlua for a sweeter coffee direction.","Add 1 dash chocolate bitters for more mocha depth."]},{"name":"Rum Manhattan","desc":"Diplom\u00e1tico rum, sweet vermouth, and bitters in a lush, dark rum Manhattan variation.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","1 oz Martini & Rossi Sweet Vermouth","2 dashes Angostura aromatic bitters"],"directions":"Stir with ice until cold and strain into a chilled coupe or Nick & Nora. Garnish with an orange twist.","swaps":["Use Smith & Cross for a drier, funkier Rum Manhattan.","Add 1 dash chocolate bitters for more richness."]},{"name":"Cherry Manhattan","desc":"Bulleit Rye, sweet vermouth, Luxardo maraschino, and cherry bitters for a fruit-forward Manhattan.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Luxardo Maraschino","2 dashes cherry bitters"],"directions":"Stir all ingredients with ice until cold. Strain into a chilled Nick & Nora glass and garnish with a cherry.","swaps":["Add 1 dash Angostura for more backbone.","Use Braastad Cognac split with the rye for a richer fruit profile."]},{"name":"Classic Manhattan","desc":"Bulleit Rye, sweet vermouth, and aromatic bitters stirred smooth with classic Manhattan structure.","ingredients":["2 oz Bulleit Rye","1 oz Martini & Rossi Sweet Vermouth","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use bourbon for a rounder Manhattan.","Garnish with orange twist or cherry depending on whether you want","brighter or darker aromatics."]},{"name":"Perfect Manhattan","desc":"Bulleit Rye with equal parts sweet and dry vermouth for a lighter, more elegant Perfect Manhattan.","ingredients":["2 oz Bulleit Rye","1/2 oz Martini & Rossi Sweet Vermouth","1/2 oz Martini & Rossi Dry Vermouth","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use bourbon if you want a softer whiskey center.","Use a lemon twist instead of orange to emphasize the dry vermouth."]},{"name":"Chocolate Manhattan","desc":"Bulleit Rye, sweet vermouth, and chocolate bitters for a darker cocoa-tinged Manhattan.","ingredients":["2 oz Bulleit Rye","1 oz Martini & Rossi Sweet Vermouth","2 dashes Aztec Chocolate Bitters","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Add 1/4 oz cr\u00e8me de cacao for a richer dessert direction.","Use orange bitters in place of Angostura for more citrus lift."]},{"name":"Pineapple Manhattan","desc":"Rye, pineapple rum, sweet vermouth, and bitters in a tropical-leaning Manhattan with dry structure.","ingredients":["1 1/2 oz Bulleit Rye","1/2 oz Planteray Stiggins' Fancy Pineapple Rum","3/4 oz Martini & Rossi Sweet Vermouth","1 dash Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Add 1/4 oz Chinola Pineapple if you want more fruit.","Use bourbon for a softer pineapple-spice balance."]},{"name":"Amaro Manhattan","desc":"Bulleit Rye, Amaro Nonino, sweet vermouth, and bitters for a more herbal bittersweet Manhattan.","ingredients":["1 1/2 oz Bulleit Rye","1/2 oz Amaro Nonino","1/2 oz Martini & Rossi Sweet Vermouth","1 dash Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use full 1 oz Amaro Nonino and omit some vermouth for a darker style.","Add cherry bitters for a fruit-led finish."]},{"name":"Honey Manhattan","desc":"Bulleit Rye, sweet vermouth, honey syrup, and bitters for a rounder softer Manhattan variation.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz honey syrup","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Add orange bitters if you want more brightness.","Use bourbon if you want the honey to feel even softer."]},{"name":"Yuzu Manhattan","desc":"Bulleit Rye, sweet vermouth, Choya Yuzu, and bitters with vivid citrus lift over a Manhattan frame.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Choya Yuzu","1 dash orange bitters","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use grapefruit peel as garnish to lean into the yuzu-citrus","connection.","Swap rye for bourbon for a gentler version."]},{"name":"Golden Manhattan","desc":"Rye and cognac with sweet vermouth and bitters for a richer golden Manhattan with warm fruit and spice.","ingredients":["1 oz Bulleit Rye","1 oz Braastad Cognac VSOP","3/4 oz Martini & Rossi Sweet Vermouth","1 dash Angostura aromatic bitters","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use D'usse if you want a fuller cognac note.","Add 1/4 oz honey syrup for more softness."]},{"name":"Garden Manhattan","desc":"Rye, sweet vermouth, basil syrup, celery bitters, and Angostura for a green savory Manhattan riff.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","1 tsp basil syrup","1 dash celery bitters","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use rosemary syrup in place of basil for a woodier garden profile.","Express a grapefruit peel instead of orange for a fresher finish."]},{"name":"Velvet Manhattan","desc":"Bourbon, cognac, sweet vermouth, and Frangelico for a softer rounded velvet-style Manhattan.","ingredients":["1 1/2 oz Bulleit Bourbon","1/2 oz Braastad Cognac VSOP","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Frangelico","1 dash Angostura aromatic bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Use rye instead of bourbon if you want it less plush.","Add chocolate bitters for a nuttier dessert direction."]},{"name":"Citrus Manhattan","desc":"Bulleit Rye, sweet vermouth, orange bitters, and grapefruit bitters for a brighter peel-driven Manhattan.","ingredients":["2 oz Bulleit Rye","3/4 oz Martini & Rossi Sweet Vermouth","2 dashes orange bitters","1 dash grapefruit bitters"],"directions":"Add all ingredients to a mixing glass with ice. Stir until cold and properly diluted. Strain into a chilled Nick & Nora glass. Garnish with an orange twist or cherry as appropriate.","swaps":["Garnish with both orange and grapefruit peels for full citrus impact.","Use dry vermouth split with sweet if you want the citrus even crisper.","# Spritz"]}]},{"name":"Spritz","subsections":[],"drinks":[{"name":"Smoked Yuzu Spritz","desc":"Yuzu, prosecco, and soda finished with a brief veil of aromatic smoke for a bright, elegant house spritz.","ingredients":["2 oz Choya Yuzu","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Add a light cap of citrus wood smoke; rosemary can be smoked with the wood for extra fragrance. Garnish with a lemon wheel.","swaps":["Add 1/2 oz Italicus for more bergamot complexity.","A dash of orange bitters makes the aroma feel warmer."]},{"name":"Pineapple Spritz","desc":"Chinola Pineapple, prosecco, and soda with juicy tropical fruit and bright bubbles.","ingredients":["2 oz Chinola Pineapple Liqueur","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir once gently. Garnish with a pineapple wedge or lemon peel.","swaps":["Split the base with 1 oz Stiggins' Fancy for extra depth.","Add 1 dash grapefruit bitters to keep it drier."]},{"name":"Coconut Passion Spritz","desc":"Chinola Passionfruit, Malibu, prosecco, and soda for a tropical sparkling aperitif.","ingredients":["1 oz Chinola Passionfruit Liqueur","1 oz Malibu Rum","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Garnish with a lime wheel or pineapple wedge.","swaps":["Use Chinola Pineapple in place of passionfruit for a sweeter version.","Add 1/4 oz yuzu juice if you want more acidity."]},{"name":"Aperol Spritz","desc":"Aperol, prosecco, and soda with orange-led bittersweet sparkle.","ingredients":["2 oz Aperol","3 oz Prosecco","1 oz club soda"],"directions":"Build in a large wine glass over ice. Stir once gently and garnish with an orange slice.","swaps":["Add 1/2 oz Limoncello for a sweeter citrus profile.","Use grapefruit peel instead of orange to keep it drier."]},{"name":"Campari Spritz","desc":"Campari, prosecco, and soda for a more bitter, orange-peel-driven spritz.","ingredients":["2 oz Campari","3 oz Prosecco","1 oz club soda"],"directions":"Build over ice in a wine glass and stir gently. Garnish with an orange slice or orange twist.","swaps":["Split the bitter base with 1 oz Campari and 1 oz Aperol for a softer","spritz.","Add 1/4 oz Choya Yuzu for extra brightness."]},{"name":"Italicus Spritz","desc":"Italicus, prosecco, and soda with layered bergamot, citrus peel, and elegant bubbles.","ingredients":["2 oz Italicus","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Garnish with a lemon wheel or green olive.","swaps":["Add 1/2 oz St-Germain for a more floral direction.","Use grapefruit peel to make the bergamot read more sharply."]},{"name":"Yuzu Spritz","desc":"Choya Yuzu, prosecco, and soda with vivid Japanese citrus and a dry sparkling finish.","ingredients":["2 oz Choya Yuzu","3 oz Prosecco","1 oz club soda"],"directions":"Build over ice in a wine glass and stir gently. Garnish with a lemon wheel or grapefruit peel.","swaps":["Add 1/2 oz Italicus for more bergamot complexity.","Use a dash of orange bitters to round the nose."]},{"name":"Garden Spritz","desc":"St-Germain, basil syrup, prosecco, and soda in a floral-green aperitif spritz.","ingredients":["1 1/2 oz St-Germain","1/4 oz basil syrup","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Garnish with a basil leaf and lemon wheel.","swaps":["Use rosemary syrup instead of basil for a woodier herbal version.","Add 1/2 oz Italicus for more citrus structure."]},{"name":"Hugo Spritz","desc":"St-Germain, prosecco, mint, and lime in a fresh alpine-style elderflower spritz.","ingredients":["1 1/2 oz St-Germain","3 oz Prosecco","1 oz club soda","2 mint leaves","1/4 oz fresh lime juice"],"directions":"Build in a wine glass over ice, clap the mint to wake it up, and stir once. Garnish with mint and a lime wheel.","swaps":["Use lemon instead of lime for a cleaner build.","Add 1/2 oz Choya Yuzu for more aromatics."]},{"name":"Bergamot Spritz","desc":"Italicus, limoncello, prosecco, and soda with bright bergamot-lemon layering.","ingredients":["1 1/2 oz Italicus","1/2 oz Limoncello","3 oz Prosecco","1 oz club soda"],"directions":"Build over ice in a wine glass and stir gently. Garnish with a lemon peel.","swaps":["Swap limoncello for Choya Yuzu to make it drier and more aromatic.","Add 1 dash orange bitters for depth."]},{"name":"Amaro Spritz","desc":"Amaro Nonino, prosecco, and soda with a richer bittersweet orange and alpine herb profile.","ingredients":["1 1/2 oz Amaro Nonino","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Garnish with an orange peel.","swaps":["Split the base with 1 oz Amaro Nonino and 1/2 oz Aperol for a lighter","version.","Use grapefruit peel to sharpen the finish."]},{"name":"Citrus Spritz","desc":"Aperol, limoncello, prosecco, and soda for sunny bitter orange and lemon sparkle.","ingredients":["1 oz Aperol","1 oz Limoncello","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Garnish with a lemon wheel and orange peel.","swaps":["Use Choya Yuzu in place of limoncello for a drier citrus expression.","Add 1 dash orange bitters if you want more bitter structure."]},{"name":"Melon Spritz","desc":"Midori, prosecco, and soda with melon sweetness balanced by bright citrus bubbles.","ingredients":["1 1/2 oz Midori Melon Liqueur","1/2 oz fresh lemon juice","3 oz Prosecco","1 oz club soda"],"directions":"Build over ice in a wine glass, stir gently, and garnish with a lemon wheel or mint sprig.","swaps":["Add 1/2 oz Choya Yuzu to dry the sweetness out.","Use vodka split with Midori for a cleaner profile."]},{"name":"Passionfruit Spritz","desc":"Chinola Passionfruit, prosecco, and soda with tart tropical fruit and sparkling lift.","ingredients":["2 oz Chinola Passionfruit Liqueur","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir once gently. Garnish with a lime wheel.","swaps":["Add 1/2 oz Choya Yuzu for a sharper finish.","Split the base with 1 oz Aperol for a bittersweet passionfruit spritz."]},{"name":"Rosy Spritz","desc":"Aperol, St-Germain, prosecco, and soda with orange, floral sweetness, and soft bitterness.","ingredients":["1 oz Aperol","1 oz St-Germain","3 oz Prosecco","1 oz club soda"],"directions":"Build over ice in a wine glass and stir gently. Garnish with an orange slice and lemon peel.","swaps":["Use Italicus instead of St-Germain for more bergamot.","Add 1 dash grapefruit bitters to pull it drier."]},{"name":"Italian Sunset Spritz","desc":"Campari, Aperol, prosecco, and soda with layered bittersweet orange in a sunset-colored spritz.","ingredients":["1 oz Campari","1 oz Aperol","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice, stir gently, and garnish with an orange slice.","swaps":["Use Amaro Nonino in place of Aperol for a darker version.","Add 1/4 oz Limoncello to brighten the center.","# Smoke & Showstoppers"]},{"name":"Golden Spritz","desc":"Aperol, Italicus, prosecco, and soda with bright orange, bergamot, and warm golden citrus.","ingredients":["1 oz Aperol","1 oz Italicus","3 oz Prosecco","1 oz club soda"],"directions":"Build all ingredients in a large wine glass over ice. Stir gently once and garnish to match the drink's citrus or herb profile.","swaps":["Use Limoncello in place of Aperol for a sweeter profile.","Add orange bitters for extra peel complexity."]},{"name":"Royal Spritz","desc":"Italicus, St-Germain, prosecco, and soda in a floral-bergamot Royal Spritz.","ingredients":["1 oz Italicus","1 oz St-Germain","3 oz Prosecco","1 oz club soda"],"directions":"Build all ingredients in a large wine glass over ice. Stir gently once and garnish to match the drink's citrus or herb profile.","swaps":["Add 1/4 oz Choya Yuzu for more citrus drive.","Use a lemon peel garnish to keep it brighter and drier."]},{"name":"Velvet Spritz","desc":"St-Germain, yuzu, prosecco, and soda for a softer rounded spritz with floral-citrus texture.","ingredients":["1 oz St-Germain","1 oz Choya Yuzu","3 oz Prosecco","1 oz club soda"],"directions":"Build all ingredients in a large wine glass over ice. Stir gently once and garnish to match the drink's citrus or herb profile.","swaps":["Use Italicus in place of St-Germain for more bergamot and less","sweetness.","Add a mint sprig to make it feel fresher and greener."]},{"name":"Indigo Spritz","desc":"Empress Indigo gin, Italicus, prosecco, and soda for a vivid purple-blue botanical spritz.","ingredients":["1 oz Empress 1908 Indigo Gin","1 oz Italicus","3 oz Prosecco","1 oz club soda"],"directions":"Build all ingredients in a large wine glass over ice. Stir gently once and garnish to match the drink's citrus or herb profile.","swaps":["Use St-Germain in place of Italicus for a more floral version.","Add a lemon wheel instead of orange to keep the color cleaner."]},{"name":"Elderflower Bourbon Spritz","desc":"Bourbon lifted with St\u2011Germain, lemon, and soda into a light floral whiskey spritz.","ingredients":["1.5 oz bourbon","3/4 oz St\u2011Germain","1/2 oz lemon juice","2 oz soda water"],"directions":"Shake bourbon, St\u2011Germain, and lemon with ice. Strain over ice and top with soda.","swaps":["Add grapefruit peel for extra aroma.","Replace soda with sparkling wine for a richer spritz."]},{"name":"Italicus Bourbon Spritz","desc":"Bergamot liqueur and bourbon topped with soda for a bright aromatic whiskey spritz.","ingredients":["1 oz bourbon","1 oz Italicus","1/2 oz lemon juice","2 oz soda water"],"directions":"Shake bourbon, Italicus, and lemon with ice. Strain over ice and top with soda.","swaps":["Add orange bitters for citrus lift.","Use prosecco instead of soda for a fuller spritz."]}]},{"name":"Tropical & Fruity","subsections":[],"drinks":[{"name":"Royal Bermuda Yacht Club","desc":"Planteray rum, lime, Cointreau, and John D. Taylor Velvet Falernum in a crisp Caribbean classic with orange-spice lift.","ingredients":["2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz Cointreau","1/4 oz John D. Taylor Velvet Falernum"],"directions":"Shake all ingredients with ice until very cold and fine strain into a chilled coupe. Garnish with a lime wheel.","swaps":["Use Smith & Cross for a funkier and more forceful Bermuda Yacht Club.","Split the base with Diplomatico for a rounder, sweeter finish."]},{"name":"Three Dots & a Dash","desc":"Smith & Cross and white rum, lime, honey, falernum, orange liqueur, and bitters in a layered tiki classic with deep spice.","ingredients":["1 1/2 oz Smith & Cross Rum","1/2 oz Planteray 3 Stars Rum","1/2 oz Cointreau","1/2 oz fresh lime juice","1/4 oz honey syrup","1/4 oz John D. Taylor Velvet Falernum","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a shaker with ice and shake until chilled. Strain into a double rocks glass or tiki mug over crushed ice. Garnish with a pineapple wedge and cherry.","swaps":["Add 1/4 oz Chinola Pineapple for extra tropical lift.","Use all Smith & Cross if you want a drier, more aggressive rum","profile."]},{"name":"Planter's Punch","desc":"Diplom\u00e1tico rum, lime, demerara, Angostura, and falernum in a bold Caribbean rum punch with warm spice and citrus.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","3/4 oz fresh lime juice","1/2 oz demerara syrup","1/4 oz John D. Taylor Velvet Falernum","2 dashes Angostura aromatic bitters"],"directions":"Add all ingredients to a shaker with ice and shake until cold. Strain into a rocks glass over crushed ice and garnish with a mint sprig and lime wheel.","swaps":["Use Smith & Cross for a stronger Jamaican-style punch.","Add 1/4 oz Chinola Passionfruit for a brighter tropical variation."]},{"name":"Painkiller","desc":"Diplom\u00e1tico rum, pineapple, orange, Malibu, and coconut cream with rich island character.","ingredients":["1 1/2 oz Diplomatico Reserva Exclusiva Rum","1/2 oz Malibu Rum","2 oz pineapple juice","1 oz orange juice","1 oz coconut cream"],"directions":"Shake all ingredients with ice until frothy and chilled. Strain into a tiki mug or double rocks glass over crushed ice. Garnish with grated nutmeg and a pineapple wedge.","swaps":["Use Planteray 3 Stars for a lighter Painkiller.","Add 1/4 oz Chinola Pineapple to intensify the fruit.","Add 1/4 oz John D. Taylor Velvet Falernum for a spicier tiki profile."]},{"name":"Banana Rum Punch","desc":"Smith & Cross rum, banana liqueur, lime, pineapple, and demerara in a rich tropical punch.","ingredients":["1 1/2 oz Smith & Cross Rum","1/2 oz Giffard Banane du Br\u00e9sil","3/4 oz pineapple juice","1/2 oz fresh lime juice","1/4 oz demerara syrup","1 dash Angostura aromatic bitters"],"directions":"Shake with ice until cold and strain into a rocks glass over fresh ice or crushed ice. Garnish with a pineapple wedge or lime wheel.","swaps":["Use Diplomatico for a rounder, sweeter punch.","Add 1/4 oz Chinola Passionfruit for more tropical acidity."]},{"name":"Pineapple Jungle Bird","desc":"Stiggins' Fancy pineapple rum, Campari, pineapple, lime, and demerara in a tropical bitter sipper.","ingredients":["1 1/2 oz Planteray Stiggins' Fancy Pineapple Rum","3/4 oz Campari","1 1/2 oz pineapple juice","1/2 oz fresh lime juice","1/2 oz demerara syrup"],"directions":"Shake all ingredients with ice and strain into a rocks glass over fresh ice. Garnish with a pineapple frond and lime wheel.","swaps":["Split the base with Smith & Cross for more funk.","Add 1 dash grapefruit bitters to extend the bitter finish."]},{"name":"Passionfruit Rum Punch","desc":"Diplom\u00e1tico rum, Chinola passionfruit, lime, pineapple, and demerara with lush tropical depth.","ingredients":["1 1/2 oz Diplomatico Reserva Exclusiva Rum","1/2 oz Chinola Passionfruit Liqueur","3/4 oz pineapple juice","1/2 oz fresh lime juice","1/4 oz demerara syrup"],"directions":"Shake with ice until chilled and strain over fresh ice in a rocks glass. Garnish with a pineapple wedge and lime wheel.","swaps":["Use Planteray 3 Stars for a brighter and drier version.","Add 1 dash Angostura to deepen the rum finish."]},{"name":"Tropical Negroni","desc":"The Botanist gin, Campari, sweet vermouth, and pineapple liqueur for a bitter tropical Negroni riff.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Chinola Pineapple Liqueur"],"directions":"Stir all ingredients with ice until cold and strain over a large cube in a rocks glass. Garnish with an orange peel and pineapple leaf.","swaps":["Use Stiggins' Fancy in place of part of the gin for a rum-like","tropical edge.","Add 1 dash grapefruit bitters to keep the bitter citrus front and","center.","# Dessert Cocktails"]}]},{"name":"Dessert & After Dinner","subsections":[],"drinks":[{"name":"Chocolate Espresso Martini","desc":"Grey Goose, Mr Black, espresso, cr\u00e8me de cacao, and chocolate bitters for a plush after-dinner house favorite.","ingredients":["1 1/2 oz Grey Goose Vodka","3/4 oz Mr Black Coffee Liqueur","3/4 oz fresh espresso","1/2 oz Tempus Fugit Cr\u00e8me de Cacao","1 dash Aztec Chocolate Bitters"],"directions":"Shake very hard with ice until the shaker is frosty and double strain into a chilled coupe or martini glass. Garnish with three coffee beans and a light cocoa dusting.","swaps":["Use Absolut Vanilla for a sweeter dessert version.","Add 1/4 oz Frangelico for a mocha-hazelnut riff.","# Appendix A -- 1-Page Tiki Build Matrix","*Use this matrix to improvise tiki drinks quickly.","*","Rum + lime + orgeat + orange cura\u00e7ao \u2192 Mai Tai","Rum + lime + falernum + bitters \u2192 Corn & Oil","Rum + lime + grapefruit + honey \u2192 Navy Grog","Gin + lemon + falernum + orgeat + passionfruit \u2192 Saturn","Rum + pineapple + lime + Campari \u2192 Jungle Bird","Rum + grapefruit + cinnamon + falernum + absinthe \u2192 Jet Pilot","Rum + orange + lemon + orgeat \u2192 Scorpion","Rum + mint + lime + bitters \u2192 Queen's Park Swizzle","# Appendix B -- Additional Bottles That Unlock More Drinks","Green Chartreuse --- unlocks Last Word, Final Ward, Bijou, Industry","Sour, Champs-\u00c9lys\u00e9es, Alaska, and many more.","Absinthe --- unlocks Corpse Reviver No. 2, Death in the Afternoon,","Absinthe Frapp\u00e9, Sazerac-style builds, Jet Pilot, Dr. Funk, and Tuxedo","No. 2.","Yellow Chartreuse --- ideal for Naked & Famous, Monte Cassino, Alaska,","and softer herbal drinks.","Wray & Nephew Overproof Rum --- dramatically expands serious tiki","options like Zombie, Jet Pilot, and Navy Grog.","Hamilton Demerara 151 --- the easiest way to push tiki into true classic","territory for Zombie, Jet Pilot, and punch floats.","Allspice Dram --- unlocks Navy Grog, Nui Nui, Ancient Mariner, Lion's","Tail, and many Caribbean-spice riffs.","Cynar --- unlocks Bitter Giuseppe, Little Italy, and a large family of","earthy amaro aperitifs.","Benedictine --- unlocks Vieux Carr\u00e9, La Louisiane, Monte Cassino,","Chrysanthemum-adjacent drinks, and honey-herbal stirred classics.","Pisco --- unlocks Pisco Sour, El Capit\u00e1n, and multiple aromatic","egg-white classics if you want to expand further."]},{"name":"Mocha Martini","desc":"Grey Goose vodka, Mr Black, cr\u00e8me de cacao, and espresso with rich coffee-chocolate depth.","ingredients":["1 1/2 oz Grey Goose Vodka","3/4 oz Mr Black Coffee Liqueur","1/2 oz Tempus Fugit Cr\u00e8me de Cacao","3/4 oz fresh espresso","1/4 oz simple syrup"],"directions":"Shake all ingredients hard with ice until the shaker is frosty. Double strain into a chilled coupe or martini glass. Garnish with three coffee beans or grated chocolate.","swaps":["Use Absolut Vanilla for a sweeter caf\u00e9-mocha style build.","Add 1 dash Aztec Chocolate Bitters for more cocoa bite."]},{"name":"Classic Latte Martini","desc":"Grey Goose vodka, Mr Black, fresh espresso, milk, and vanilla shaken creamy and smooth like a chilled latte.","ingredients":["1 1/2 oz Grey Goose Vodka","1 oz Mr Black Coffee Liqueur","1 oz fresh espresso","1 oz whole milk","1/4 oz vanilla syrup"],"directions":"Add all ingredients to a shaker with ice and shake hard for 15--20 seconds until frothy and cold. Double strain into a chilled coupe or martini glass. Garnish with three coffee beans or a light cocoa dusting.","swaps":["Use Absolut Vanilla for a sweeter latte-style build.","Replace Mr Black with Kahlua if you want a richer, softer coffee","profile."]},{"name":"Mocha Latte Martini","desc":"Vodka, coffee liqueur, espresso, milk, and cr\u00e8me de cacao in a creamy dessert martini with caf\u00e9-mocha richness.","ingredients":["1 1/2 oz Grey Goose Vodka","1 oz Mr Black Coffee Liqueur","1 oz fresh espresso","1 oz whole milk","1/2 oz Tempus Fugit Cr\u00e8me de Cacao"],"directions":"Shake all ingredients with ice until very cold and creamy. Double strain into a chilled coupe or martini glass. Garnish with three coffee beans or a light shaving of dark chocolate.","swaps":["Use Absolut Vanilla for a sweeter mocha-latte profile.","Drizzle a thin line of chocolate syrup inside the glass for a more","dessert-forward presentation."]},{"name":"Vanilla Latte Martini","desc":"Vodka, coffee liqueur, espresso, milk, and vanilla syrup shaken into a smooth caf\u00e9-style martini with soft sweetness.","ingredients":["1 1/2 oz Absolut Vanilla Vodka","1 oz Mr Black Coffee Liqueur","1 oz fresh espresso","3/4 oz whole milk","1/4 oz vanilla syrup"],"directions":"Add all ingredients to a shaker with ice and shake hard for 15 seconds. Double strain into a chilled coupe or martini glass. Garnish with three coffee beans, a light cocoa dusting, or a fine grate of dark chocolate.","swaps":["Use Grey Goose and keep the vanilla syrup if you want a less overt","vanilla build.","Replace Mr Black with Kahlua for a sweeter after-dinner version."]},{"name":"Peanut Butter White Russian","desc":"Screwball, Kahlua, and Irish cream served smooth and dessert-like over ice.","ingredients":["1 1/2 oz Screwball Peanut Butter Whiskey","1 oz Kahlua","1 oz Kavanagh Irish Cream"],"directions":"Build over fresh ice in a rocks glass and stir gently to combine. Garnish with grated chocolate or a light dusting of cocoa.","swaps":["Use Mr Black instead of Kahlua for a drier coffee note.","Add 1/4 oz Frangelico to lean into the nutty profile."]},{"name":"Toasted Almond","desc":"Disaronno, Kahlua, and Irish cream with soft roasted nut and coffee notes.","ingredients":["1 oz Disaronno Amaretto","1 oz Kahlua","1 oz Kavanagh Irish Cream"],"directions":"Shake briefly with ice and strain over fresh ice in a rocks glass, or serve up in a small coupe for a silkier presentation. Garnish with grated nutmeg or cocoa.","swaps":["Add 1/2 oz Frangelico for a deeper hazelnut character.","Use Mr Black for a less sweet coffee edge."]},{"name":"Chocolate Velvet","desc":"Vodka, cr\u00e8me de cacao, Irish cream, and chocolate bitters in a lush dessert cocktail.","ingredients":["1 1/2 oz Grey Goose Vodka","3/4 oz Tempus Fugit Cr\u00e8me de Cacao","3/4 oz Kavanagh Irish Cream","1 dash Aztec Chocolate Bitters"],"directions":"Shake all ingredients with ice until cold and silky. Double strain into a chilled coupe. Garnish with grated chocolate.","swaps":["Use vanilla vodka for a softer milk-chocolate profile.","Add 1/4 oz Mr Black to turn it toward mocha."]},{"name":"Banana Alexander","desc":"Braastad Cognac, banana liqueur, Irish cream, and cr\u00e8me de cacao in a tropical Alexander-style dessert drink.","ingredients":["1 oz Braastad Cognac VSOP","1/2 oz Giffard Banane du Br\u00e9sil","1/2 oz Tempus Fugit Cr\u00e8me de Cacao","1 oz Kavanagh Irish Cream"],"directions":"Shake with ice until thoroughly chilled and strain into a chilled coupe. Garnish with grated nutmeg or cocoa.","swaps":["Use D'usse for a deeper cognac note.","Replace banana liqueur with Frangelico for a more traditional nutty","Alexander profile."]},{"name":"Caramel Coffee Martini","desc":"Absolut Vanilla, Mr Black, espresso, and demerara syrup with toasted caramel sweetness.","ingredients":["1 1/2 oz Absolut Vanilla Vodka","3/4 oz Mr Black Coffee Liqueur","3/4 oz fresh espresso","1/4 oz demerara syrup","1 dash toasted almond bitters"],"directions":"Shake with ice until frothy and very cold. Double strain into a chilled martini glass. Garnish with three coffee beans.","swaps":["Use Grey Goose and add 1/4 oz Kahlua for a lighter caramel direction.","Add 1 dash chocolate bitters to deepen the roast notes."]},{"name":"Nutty Russian","desc":"Vodka, Frangelico, Kahlua, and Irish cream with layered hazelnut and coffee richness.","ingredients":["1 oz Tito's Vodka","3/4 oz Frangelico","3/4 oz Kahlua","1 oz Kavanagh Irish Cream"],"directions":"Build over fresh ice in a rocks glass and stir gently. Garnish with grated nutmeg or cocoa.","swaps":["Use Screwball instead of vodka for a peanut-hazelnut twist.","Use Mr Black for a drier coffee profile."]},{"name":"Chocolate Rum Martini","desc":"Diplom\u00e1tico rum, cr\u00e8me de cacao, and Irish cream with dark chocolate and molasses richness.","ingredients":["1 1/2 oz Diplomatico Reserva Exclusiva Rum","3/4 oz Tempus Fugit Cr\u00e8me de Cacao","3/4 oz Kavanagh Irish Cream","1 dash Aztec Chocolate Bitters"],"directions":"Shake with ice until chilled and double strain into a chilled coupe. Garnish with grated chocolate or orange peel.","swaps":["Use Stiggins' Fancy for a lighter tropical chocolate profile.","Add 1/4 oz Mr Black for a mocha-rum variation."]},{"name":"Velvet Espresso","desc":"Belvedere Unfiltered, Mr Black, espresso, and Irish cream for a softer, silkier Espresso Martini.","ingredients":["1 1/2 oz Belvedere Unfiltered Vodka","3/4 oz Mr Black Coffee Liqueur","3/4 oz fresh espresso","1/2 oz Kavanagh Irish Cream"],"directions":"Shake hard with ice until frothy and double strain into a chilled coupe. Garnish with three coffee beans.","swaps":["Use vanilla vodka to sweeten the profile.","Add 1 dash chocolate bitters for more depth."]},{"name":"Banana Coffee Martini","desc":"Vodka, Mr Black, banana liqueur, and espresso in a playful tropical coffee cocktail.","ingredients":["1 1/2 oz Grey Goose Vodka","3/4 oz Mr Black Coffee Liqueur","1/2 oz Giffard Banane du Br\u00e9sil","3/4 oz fresh espresso"],"directions":"Shake all ingredients hard with ice and double strain into a chilled coupe. Garnish with three coffee beans or a banana chip.","swaps":["Use rum instead of vodka for a darker tropical coffee build.","Add 1/4 oz cr\u00e8me de cacao for a chocolate-banana note."]},{"name":"Cacao Old Fashioned Dessert","desc":"Woodford Reserve, cr\u00e8me de cacao, demerara, and chocolate bitters in a whiskey dessert sipper.","ingredients":["1 3/4 oz Woodford Reserve Bourbon","1/4 oz Tempus Fugit Cr\u00e8me de Cacao","1 tsp demerara syrup","2 dashes Aztec Chocolate Bitters","1 dash orange bitters"],"directions":"Stir with ice until cold and strain over a large cube in a rocks glass. Garnish with a wide orange peel.","swaps":["Use Bulleit Rye to add spice against the sweetness.","Add 1/4 oz Frangelico for a nutty-cocoa version."]},{"name":"Chocolate Amaro Flip","desc":"Amaro Nonino, cr\u00e8me de cacao, cognac, and egg for a rich velvety after-dinner flip.","ingredients":["1 oz Amaro Nonino","1 oz Braastad Cognac VSOP","1/2 oz Tempus Fugit Cr\u00e8me de Cacao","1/4 oz simple syrup","1 whole egg"],"directions":"Dry shake all ingredients thoroughly, then shake again with ice until chilled and creamy. Double strain into a coupe and garnish with grated nutmeg or cocoa.","swaps":["Use D'usse for a richer cognac backbone.","Add 1 dash chocolate bitters for more cocoa definition."]},{"name":"Nutty Espresso Martini","desc":"Vodka, Mr Black, Frangelico, and espresso with a roasted hazelnut finish.","ingredients":["1 1/2 oz Grey Goose Vodka","3/4 oz Mr Black Coffee Liqueur","1/2 oz Frangelico","3/4 oz fresh espresso"],"directions":"Shake very hard with ice and double strain into a chilled martini glass. Garnish with three coffee beans.","swaps":["Use Screwball in place of some vodka for a peanut-butter coffee","version.","Add 1 dash toasted almond bitters for extra nuttiness."]},{"name":"Sweet Rum Alexander","desc":"Diplom\u00e1tico rum, Irish cream, and cr\u00e8me de cacao in a lush rum-forward Alexander.","ingredients":["1 1/2 oz Diplomatico Reserva Exclusiva Rum","3/4 oz Kavanagh Irish Cream","1/2 oz Tempus Fugit Cr\u00e8me de Cacao"],"directions":"Shake with ice until chilled and strain into a coupe glass. Garnish with grated nutmeg.","swaps":["Use cognac for a more classic Alexander direction.","Add 1/4 oz Frangelico for extra dessert richness.","# Spritz & Aperitivo"]},{"name":"Golden Orchard","desc":"Grand Marnier, vodka, ruby grapefruit, lemon, honey, and bitters shaken into a bright citrus nightcap that drinks like orange marmalade and almond pastry.","ingredients":["1 oz Grand Marnier","1/2 oz vodka","3/4 oz ruby red grapefruit juice","1/2 oz lemon juice","1/2 oz honey syrup","1 dash grapefruit bitters","Optional egg white or foam"],"directions":"Dry shake if using egg white. Add ice and shake again until very cold. Double strain into a chilled coupe.","swaps":["Replace grapefruit bitters with toasted almond bitters.","Add 1/4 oz St\u2011Germain for floral lift."]},{"name":"Golden Orchard (Almond Edition)","desc":"A dessert-leaning riff on the Golden Orchard with toasted almond bitters adding marzipan depth to orange, grapefruit, and honey.","ingredients":["1 oz Grand Marnier","1/2 oz vodka","3/4 oz ruby red grapefruit juice","1/2 oz lemon juice","1/2 oz honey syrup","1 dash toasted almond bitters"],"directions":"Shake with ice until chilled and strain into a coupe.","swaps":["Add 2 drops saline solution to sharpen citrus.","Replace vodka with gin for a botanical version."]},{"name":"Velvet Peach Cloud","desc":"Peach syrup, elderflower, lemon, and cream shaken into a lush peach-cobbler cocktail with floral lift.","ingredients":["1 oz peach syrup","1/2 oz St\u2011Germain","1/2 oz vodka","3/4 oz lemon juice","3/4 oz cream","1 dash toasted almond bitters"],"directions":"Shake hard with ice and double strain into a chilled coupe.","swaps":["Use gin instead of vodka.","Add 1/4 oz vanilla syrup for dessert variation."]},{"name":"Cherry Blossom Nightcap","desc":"Gin, elderflower, cherry, lemon, and silky foam combine into a soft floral citrus sour that feels light yet dessert-like.","ingredients":["1 oz St\u2011Germain","1/2 oz Old Tom gin","1/2 oz cherry syrup","3/4 oz lemon juice","1 egg white or foam"],"directions":"Dry shake then shake with ice until frothy. Double strain into coupe.","swaps":["Add grapefruit bitters for brightness.","Swap raspberry syrup for variation."]},{"name":"Midnight Peanut Silk","desc":"Peanut butter whiskey, vodka, cream, and chocolate bitters shaken into a smooth dessert cocktail reminiscent of a Reese's milkshake.","ingredients":["1 oz peanut butter whiskey","3/4 oz vodka","3/4 oz cream","1/2 oz simple syrup","2 dashes chocolate bitters"],"directions":"Shake hard with ice until chilled and strain into a coupe.","swaps":["Add banana liqueur for PB\u2011banana version.","Tiny pinch sea salt enhances dessert notes."]},{"name":"Yuzu Honey Fizz","desc":"Gin, yuzu, honey, and lemon topped with sparkling wine or soda for a bright, elegant citrus nightcap.","ingredients":["1 oz gin","3/4 oz yuzu juice","1/2 oz honey syrup","1/2 oz lemon juice","Egg white optional","2 oz sparkling wine or soda"],"directions":"Dry shake first ingredients then shake with ice. Strain and top with bubbles.","swaps":["Replace gin with vodka.","Add elderflower for floral version."]},{"name":"Orange Creamsicle Flip","desc":"Vodka, orange liqueur, cream, vanilla sweetness, and egg shaken into a silky orange-dessert cocktail.","ingredients":["1 oz vodka","3/4 oz orange liqueur","1 oz cream","1/2 oz vanilla syrup","1 whole egg"],"directions":"Dry shake vigorously then shake with ice. Double strain into coupe.","swaps":["Add chocolate bitters for orange\u2011chocolate version.","Use rum for richer profile."]},{"name":"Honey Almond Sour","desc":"Honey syrup, almond bitters, citrus, and spirit shaken into a balanced pastry-like sour.","ingredients":["1 1/2 oz base spirit","3/4 oz lemon juice","3/4 oz honey syrup","1 dash almond bitters","Egg white optional"],"directions":"Dry shake then shake with ice until frothy. Strain into coupe.","swaps":["Add elderflower liqueur for floral riff.","Add saline drops to balance sweetness."]},{"name":"Peach Elderflower Spritz","desc":"Peach, elderflower, citrus, and sparkling wine in a light floral spritz ideal as an elegant nightcap.","ingredients":["1 oz peach syrup","1/2 oz elderflower liqueur","1/2 oz lemon juice","3 oz sparkling wine"],"directions":"Build over ice in wine glass and stir gently.","swaps":["Add gin for structure.","Grapefruit peel garnish adds brightness."]}]},{"name":"Tiki & Punch","subsections":[],"drinks":[{"name":"Saturn","desc":"The Botanist gin, Chinola Passionfruit, lemon, John D. Taylor Velvet Falernum, and orgeat in a lush tiki-style gin sour.","ingredients":["1 1/2 oz The Botanist Dry Gin","1/2 oz Chinola Passionfruit Liqueur","1/2 oz fresh lemon juice","1/4 oz John D. Taylor Velvet Falernum","1/4 oz orgeat syrup"],"directions":"Add all ingredients to a shaker with ice and shake hard until chilled. Double strain into a chilled coupe glass and garnish with a lemon twist or edible flower.","swaps":["Use Empress 1908 for a vivid purple Saturn.","Add 1/4 oz fresh lime juice for a sharper tiki profile."]},{"name":"Navy Grog","desc":"A layered tiki bruiser of aged rum, overproof rum, grapefruit, lime, honey, and allspice depth over crushed ice.","ingredients":["1 oz Diplomatico Reserva Exclusiva Rum","1 oz Smith & Cross Rum","1 oz Wray & Nephew Overproof Rum","3/4 oz fresh lime juice","3/4 oz white grapefruit juice","3/4 oz honey syrup","1/4 oz allspice dram","2 dashes Angostura bitters"],"directions":"Add all ingredients to a shaker with pebble ice and whip shake briefly. Dump into a double rocks glass or tiki mug and top with more crushed ice. Garnish with a mint bouquet, grapefruit peel, and a spent lime shell.","swaps":["For a softer build, replace Wray & Nephew with Planteray 3 Stars","Rum.","Use cinnamon bark with oak smoke for a dramatic smoked Navy Grog","variation."]},{"name":"Fog Cutter","desc":"A sprawling tiki classic with rum, brandy, gin, citrus, orgeat, and a sherry float for layered tropical complexity.","ingredients":["1 oz Planteray 3 Stars Rum","1 oz Braastad Cognac VSOP","1 oz Aviation Gin","1 oz fresh lemon juice","1/2 oz fresh orange juice","1/2 oz orgeat syrup","1/2 oz cream sherry"],"directions":"Shake all but the sherry with ice until chilled. Strain into a tiki mug or large stemmed glass over crushed ice. Float the sherry over the top and garnish with mint and an orange slice.","swaps":["Swap cream sherry for your Harvey's Solera Sherry for a rounder","finish.","Use The Botanist gin for a drier, more herbal Fog Cutter."]},{"name":"Missionary's Downfall","desc":"Cool, green, and lush with rum, peach, pineapple, mint, lime, and crushed ice blended into a tropical slush.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/2 oz Giffard Peche de Vigne","3/4 oz pineapple juice","1/2 oz fresh lime juice","1/4 oz honey syrup","8 mint leaves"],"directions":"Blend all ingredients with a scoop of crushed ice until slushy. Pour into a pilsner or footed goblet and top with more crushed ice. Garnish with a mint bouquet and a peach slice if available.","swaps":["Use Smith & Cross split with the rum for more funk.","Add 1/4 oz Green Chartreuse for a greener, more alpine riff."]},{"name":"Scorpion","desc":"Brandy, rum, orange, lemon, and orgeat in a broad, old-school tiki sour built for sharing or a big coupe.","ingredients":["1 oz Braastad Cognac VSOP","1 oz Planteray 3 Stars Rum","1 oz fresh orange juice","3/4 oz fresh lemon juice","1/2 oz orgeat syrup","1/4 oz simple syrup"],"directions":"Shake all ingredients with ice and strain into a large coupe or double rocks glass over crushed ice. Garnish with grated nutmeg and an orange wheel.","swaps":["Add 1/2 oz Smith & Cross for more tiki intensity.","Use a dash of absinthe as a rinse for a drier aromatic top note."]},{"name":"Passionfruit Saturn","desc":"A fuller, fruitier Saturn with extra Chinola passionfruit wrapped around gin, lemon, falernum, and almond.","ingredients":["1 1/2 oz Hendrick's Gin","3/4 oz Chinola Passionfruit Liqueur","1/2 oz fresh lemon juice","1/4 oz John D. Taylor's Velvet Falernum","1/4 oz orgeat syrup"],"directions":"Shake with ice and double strain into a chilled coupe. Garnish with a dehydrated lemon wheel and mint tip.","swaps":["Use The Botanist for a drier core.","Add 1/4 oz pineapple juice for a rounder tropical profile."]},{"name":"Pineapple Saturn","desc":"A bright Saturn riff layering gin, lemon, pineapple, falernum, and orgeat for a tropical-herbal sour.","ingredients":["1 1/2 oz Hendrick's Neptunia Gin","1/2 oz Chinola Pineapple Liqueur","1/2 oz fresh lemon juice","1/4 oz John D. Taylor's Velvet Falernum","1/4 oz orgeat syrup","1/4 oz pineapple juice"],"directions":"Shake all ingredients hard with ice and double strain into a chilled coupe. Garnish with a pineapple leaf and lemon peel.","swaps":["Use Chinola Passionfruit instead of pineapple for a tarter Saturn","build.","A rosemary smoke cap works beautifully here with citrus wood."]},{"name":"Chartreuse Saturn","desc":"A heady herbal Saturn variation with gin, Green Chartreuse, lemon, falernum, and almond richness.","ingredients":["1 oz The Botanist Dry Gin","1/2 oz Green Chartreuse","1/2 oz fresh lemon juice","1/4 oz Chinola Passionfruit Liqueur","1/4 oz John D. Taylor's Velvet Falernum","1/4 oz orgeat syrup"],"directions":"Shake with ice until cold and double strain into a chilled coupe. Garnish with a lemon twist and mint leaf.","swaps":["Use Yellow Chartreuse for a softer herbal profile if you pick it up","later.","Add 1 dash celery bitters for a greener finish."]},{"name":"Mezcal Saturn","desc":"Smoky mezcal and gin wrapped around passionfruit, lemon, falernum, and orgeat for a dark tropical sour.","ingredients":["1 oz Mezcal Ilegal Joven","1/2 oz The Botanist Dry Gin","1/2 oz Chinola Passionfruit Liqueur","1/2 oz fresh lemon juice","1/4 oz John D. Taylor's Velvet Falernum","1/4 oz orgeat syrup"],"directions":"Shake hard with ice and double strain into a chilled coupe. Garnish with a grapefruit peel and mint tip.","swaps":["Use all mezcal for a more assertively smoky drink.","A quick orange-wood smoke rinse heightens the mezcal beautifully."]},{"name":"Yuzu Saturn","desc":"A citrus-driven Saturn riff with gin, yuzu, falernum, orgeat, and lemon for a vivid tropical-herbal snap.","ingredients":["1 1/2 oz Hendrick's Neptunia Gin","1/4 oz Choya Yuzu","1/4 oz yuzu juice","1/2 oz fresh lemon juice","1/4 oz John D. Taylor's Velvet Falernum","1/4 oz orgeat syrup"],"directions":"Shake all ingredients with ice until very cold and double strain into a chilled coupe. Garnish with a lemon peel and mint tip.","swaps":["Use The Botanist for a cleaner herbal frame.","Add 1 dash orange bitters to round the nose."]},{"name":"Rum Swizzle","desc":"A long crushed-ice Caribbean classic with rum, falernum, citrus, bitters, and deep island spice.","ingredients":["1 1/2 oz Smith & Cross Rum","1 oz Planteray 3 Stars Rum","1/2 oz John D. Taylor's Velvet Falernum","3/4 oz fresh lime juice","1/2 oz fresh orange juice","2 dashes Angostura bitters"],"directions":"Build everything in a Collins glass packed with crushed ice and swizzle until frosty. Garnish with mint, orange peel, and a dusting of grated nutmeg.","swaps":["Use Diplomatico in place of Planteray for a richer, sweeter","version.","Add 1/4 oz allspice dram if you pick it up for deeper tiki spice."]},{"name":"Queen's Park Swizzle","desc":"Rum, lime, mint, sugar, and bitters swizzled hard into an icy tropical mint cooler.","ingredients":["2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz demerara syrup","8 mint leaves","2 dashes Angostura bitters"],"directions":"Lightly press mint with syrup in a Collins glass, add rum and lime, fill with crushed ice, and swizzle until frosted. Float the bitters on top and garnish with a tall mint bouquet.","swaps":["Use Smith & Cross split with the rum for a funkier Queen's Park.","Add 1/4 oz falernum for a spiced Caribbean twist."]},{"name":"Jet Pilot","desc":"A dense tiki powerhouse of rum, grapefruit, lime, falernum, cinnamon, and absinthe with real depth and heat.","ingredients":["1 oz Smith & Cross Rum","1 oz Planteray 3 Stars Rum","1/2 oz Wray & Nephew Overproof Rum","1/2 oz fresh lime juice","1/2 oz white grapefruit juice","1/2 oz cinnamon syrup","1/2 oz John D. Taylor's Velvet Falernum","1 dash Angostura bitters","1 dash absinthe"],"directions":"Shake with crushed ice and dump into a double rocks glass or tiki mug. Top with more crushed ice and garnish with mint and a grapefruit peel.","swaps":["Replace Wray & Nephew with additional Smith & Cross for a slightly","rounder build.","A tiny charred cinnamon stick makes an excellent aromatic garnish."]},{"name":"Cobra's Fang","desc":"Dark, spicy, and dangerously easy-drinking with rum, passionfruit, lime, falernum, and bitters over crushed ice.","ingredients":["1 1/2 oz Smith & Cross Rum","1 oz Diplomatico Reserva Exclusiva Rum","1/2 oz Chinola Passionfruit Liqueur","1/2 oz fresh lime juice","1/2 oz orange juice","1/4 oz John D. Taylor's Velvet Falernum","1 dash Angostura bitters","1 dash absinthe"],"directions":"Shake with crushed ice and pour into a tiki mug. Top with fresh crushed ice and garnish with mint, orange peel, and a few dashes of bitters.","swaps":["Use all Smith & Cross for a drier, more aggressive version.","A cinnamon-and-orange-wood smoke cap plays very well here."]},{"name":"Nui Nui","desc":"A warm-spiced tiki sour with rum, citrus, allspice, vanilla, and orange richness.","ingredients":["2 oz Diplomatico Reserva Exclusiva Rum","3/4 oz fresh lime juice","1/2 oz orange juice","1/2 oz Cointreau","1/4 oz vanilla syrup","1/4 oz allspice dram"],"directions":"Shake all ingredients with ice and strain into a double rocks glass over fresh ice. Garnish with an orange wheel and grated nutmeg.","swaps":["Use Smith & Cross split with Diplomatico for more edge.","Add 1 dash Angostura if you want the spice to show more clearly."]},{"name":"Ancient Mariner","desc":"A modern tiki classic of Jamaican rum, allspice, grapefruit, lime, and demerara with a dark bitter edge.","ingredients":["1 1/2 oz Smith & Cross Rum","1/2 oz Diplomatico Reserva Exclusiva Rum","3/4 oz fresh lime juice","3/4 oz white grapefruit juice","1/2 oz demerara syrup","1/4 oz allspice dram","1 dash Angostura bitters"],"directions":"Shake with crushed ice and dump into a double rocks glass or tiki mug. Top with more crushed ice and garnish with mint and a grapefruit peel.","swaps":["Use Wray & Nephew split with Smith & Cross for an even more Jamaican","profile.","Add 1/4 oz falernum for more spiced roundness."]},{"name":"Tradewinds","desc":"An easy tropical sipper with rum, apricot, coconut, lemon, and a soft creamy finish.","ingredients":["1 oz Planteray 3 Stars Rum","1 oz Diplomatico Reserva Exclusiva Rum","1/2 oz apricot liqueur","1 oz coconut cream","3/4 oz fresh lemon juice"],"directions":"Shake very hard with ice until creamy and chilled. Strain into a coupe or tiki mug over crushed ice. Garnish with grated nutmeg and a lemon peel.","swaps":["Use Stiggins' Fancy for one ounce of the rum base to add pineapple","depth.","A touch of cinnamon on top makes the coconut pop."]},{"name":"Dr. Funk","desc":"Absinthe, rum, lime, grenadine, and soda in a bright, weird, old-school tiki cooler.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/4 oz absinthe","3/4 oz fresh lime juice","1/2 oz grenadine","2 oz club soda"],"directions":"Shake rum, absinthe, lime, and grenadine with ice. Strain into a Collins glass over fresh ice and top with soda. Garnish with mint and a lime wheel.","swaps":["Use Smith & Cross for a more assertive Dr. Funk.","Add 1/4 oz falernum to deepen the spice."]},{"name":"Zombie","desc":"A no-holds-barred tiki monster with layered rums, citrus, grenadine, cinnamon, absinthe, and overproof firepower.","ingredients":["1 oz Smith & Cross Rum","1 oz Planteray 3 Stars Rum","1 oz Wray & Nephew Overproof Rum","3/4 oz fresh lime juice","1/2 oz white grapefruit juice","1/2 oz cinnamon syrup","1/4 oz grenadine","1/4 oz John D. Taylor's Velvet Falernum","1 dash Angostura bitters","1 dash absinthe"],"directions":"Shake all ingredients with crushed ice and pour into a tall tiki mug. Add more crushed ice and garnish with mint, grapefruit peel, and a spent lime shell.","swaps":["Use Hamilton Demerara 151 if you pick it up for a more classic","Zombie spec.","A quick cinnamon smoke cap makes this even more theatrical."]},{"name":"Royal Hawaiian","desc":"Pineapple, lemon, orgeat, and gin in a bright old tiki-house classic with almond depth.","ingredients":["1 1/2 oz Aviation Gin","1 oz pineapple juice","1/2 oz fresh lemon juice","1/2 oz orgeat syrup"],"directions":"Shake with ice until very cold and strain into a chilled coupe. Garnish with a pineapple leaf or lemon peel.","swaps":["Use Hendrick's Neptunia for a brighter coastal profile.","Add 1 dash orange bitters for more perfume."]},{"name":"Scorpion Bowl","desc":"Big-format tropical citrus and almond punch built for a crowd and perfect over crushed ice.","ingredients":["4 oz Planteray 3 Stars Rum","2 oz Braastad Cognac VSOP","4 oz orange juice","3 oz lemon juice","2 oz orgeat syrup","1 oz simple syrup"],"directions":"Shake in batches or stir in a large bowl with pebble ice, then pour into a large bowl or pitcher over plenty of crushed ice. Garnish with orange wheels, lemon wheels, and mint.","swaps":["Add 1 oz overproof rum float for a more classic party version.","A dash of bitters on top helps keep it from feeling too sweet."]},{"name":"Philadelphia Fish House Punch","desc":"A historic American punch of rum, cognac, peach, citrus, and black tea with serious party energy.","ingredients":["6 oz D'usse Cognac","6 oz Planteray 3 Stars Rum","3 oz Giffard Peche de Vigne","4 oz fresh lemon juice","4 oz black tea","3 oz simple syrup"],"directions":"Stir all ingredients in a punch bowl with a large ice block or plenty of cubed ice until well chilled. Serve in punch cups or rocks glasses and garnish with lemon wheels and grated nutmeg.","swaps":["Use demerara syrup instead of simple for more depth.","A little sparkling wine added at service makes it brighter."]},{"name":"Champagne Punch","desc":"A classic sparkling punch with brandy, citrus, sugar, and bubbles --- light, festive, and dangerously easy to drink.","ingredients":["4 oz Braastad Cognac VSOP","2 oz Cointreau","4 oz fresh lemon juice","3 oz simple syrup","1 bottle Prosecco"],"directions":"Combine the cognac, Cointreau, lemon, and simple in a punch bowl with a large ice block. Top with the prosecco just before serving and stir once gently. Garnish with lemon wheels and orange peels.","swaps":["Add strawberries or berries if you want it more festive.","A tiny absinthe rinse in the punch bowl is a fun old-school move."]},{"name":"Rum Barrel Punch","desc":"A rich tiki party punch with multiple rums, pineapple, citrus, spice, and bitters built for a crowd.","ingredients":["4 oz Smith & Cross Rum","4 oz Diplomatico Reserva Exclusiva Rum","6 oz pineapple juice","4 oz orange juice","3 oz lime juice","2 oz falernum","2 oz demerara syrup","4 dashes Angostura bitters"],"directions":"Stir everything in a large pitcher with plenty of cubed ice until chilled. Serve over crushed ice in rocks glasses or tiki mugs. Garnish with mint and orange wheels.","swaps":["Add 2 oz overproof rum if you want a true tiki-party version.","Cinnamon and grapefruit peels make a beautiful garnish set."]},{"name":"Hurricane Party Punch","desc":"Passionfruit, rum, citrus, and grenadine stretched into a crowd-pleasing New Orleans-style party pitcher.","ingredients":["6 oz Planteray 3 Stars Rum","4 oz Smith & Cross Rum","4 oz Chinola Passionfruit Liqueur","4 oz orange juice","4 oz lime juice","2 oz grenadine"],"directions":"Stir in a pitcher with ice until chilled and serve over fresh ice in Collins or hurricane glasses. Garnish with orange wheels and cherries.","swaps":["Use more passionfruit and less grenadine if you want it tarter.","A dash of absinthe in the pitcher makes it more complex."]},{"name":"Tiki Party Punch","desc":"A loose-format tiki crowd pleaser with rum, citrus, pineapple, orgeat, and falernum that can flex with your pantry.","ingredients":["6 oz Planteray 3 Stars Rum","4 oz Diplomatico Reserva Exclusiva Rum","6 oz pineapple juice","4 oz orange juice","4 oz lime juice","2 oz orgeat syrup","2 oz falernum","4 dashes Angostura bitters"],"directions":"Stir all ingredients with a large block of ice in a punch bowl until chilled. Serve in small rocks glasses over fresh ice. Garnish with mint and citrus wheels.","swaps":["Add overproof rum to float the bowl if you want more intensity.","A little grated nutmeg across the top ties it together beautifully.","# Keith's House Cocktails"]}]},{"name":"Smoke & Showstoppers","subsections":[],"drinks":[{"name":"Smoke Bubble Paloma","desc":"Espolon tequila, grapefruit, lime, and soda served beneath a smoked citrus bubble for table-side drama.","ingredients":["2 oz Espolon Blanco Tequila","2 oz fresh grapefruit juice","1/2 oz fresh lime juice","1/4 oz simple syrup","1 1/2 oz club soda"],"directions":"Shake tequila, grapefruit, lime, and simple with ice. Strain into a salt-rimmed highball over fresh ice and top with soda. Finish with a smoke bubble using citrus wood; rosemary or grapefruit peel can be tucked into the smoker for extra aroma. Garnish with a grapefruit peel.","swaps":["Split the base with mezcal for an even smokier build.","Add 1 dash grapefruit bitters for a drier finish."]},{"name":"Smoked Pineapple Old Fashioned","desc":"Woodford Reserve, Stiggins' pineapple rum, demerara, and bitters smoked for a tropical spirit-forward showpiece.","ingredients":["1 1/2 oz Woodford Reserve Bourbon","1/2 oz Planteray Stiggins' Fancy Pineapple Rum","1/4 oz demerara syrup","2 dashes Angostura aromatic bitters","1 dash orange bitters"],"directions":"Stir with ice until chilled and strain over a large clear cube in a double rocks glass. Express an orange peel over the top. Fill the glass with smoke from the smoking gun before serving.","swaps":["Add 1 dash peach bitters for a softer fruit finish.","Use Diplomatico instead of bourbon for a rum-forward version."]},{"name":"Rosemary Smoke Martini","desc":"The Botanist gin martini perfumed with rosemary smoke and bright lemon oils.","ingredients":["2 1/2 oz The Botanist Dry Gin","1/2 oz Martini & Rossi Dry Vermouth","1 dash orange bitters"],"directions":"Stir with ice until very cold and strain into a chilled martini glass. Capture rosemary smoke in the glass or under a cloche before serving. Garnish with a lemon twist.","swaps":["Use Hendrick's Oasium for a greener botanical profile.","Add 1/4 oz Italicus for more bergamot lift."]},{"name":"Smoked Passionfruit Daiquiri","desc":"Planteray rum, Chinola passionfruit, and lime finished with aromatic smoke for a tropical showstopper.","ingredients":["2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz Chinola Passionfruit Liqueur","1/4 oz simple syrup"],"directions":"Shake all ingredients with ice until cold and fine strain into a chilled coupe. Trap a small amount of smoke in the serving glass before pouring or finish under a smoke bubble. Garnish with a lime wheel.","swaps":["Split the base with Smith & Cross for more depth against the smoke.","Add 1 dash grapefruit bitters to dry out the finish."]},{"name":"Smoked Chocolate Manhattan","desc":"Bulleit Rye, sweet vermouth, chocolate bitters, and oak smoke in a rich after-dinner Manhattan.","ingredients":["2 oz Bulleit Rye","1 oz Martini & Rossi Sweet Vermouth","2 dashes Aztec Chocolate Bitters","1 dash Angostura aromatic bitters"],"directions":"Stir all ingredients with ice until chilled and strain into a Nick & Nora glass. Smoke the glass with oak or cherry wood before pouring. Garnish with an orange twist.","swaps":["Add 1/4 oz Mr Black for a mocha-leaning Manhattan.","Use bourbon for a softer whiskey base."]},{"name":"Cedar Smoke Boulevardier","desc":"Woodford Reserve, Campari, and sweet vermouth smoked with cedar for a dark aromatic Boulevardier.","ingredients":["1 1/2 oz Woodford Reserve Bourbon","3/4 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1 dash orange bitters"],"directions":"Stir with ice until chilled. Strain over a large cube in a rocks glass and fill the glass with cedar smoke before serving. Garnish with an orange peel.","swaps":["Use rye for a drier cedar-spice finish.","Add 1/4 oz Amaro Nonino for a darker herbal core."]},{"name":"Smoked Citrus Negroni","desc":"The Botanist gin, Campari, sweet vermouth, and citrus smoke with bright bitter depth.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","1 oz Martini & Rossi Sweet Vermouth","1 dash orange bitters"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Smoke the serving glass lightly with citrus wood before pouring. Garnish with an orange peel and grapefruit peel.","swaps":["Add 1/4 oz Choya Yuzu for extra citrus lift.","Use Neptunia for a brighter, more coastal expression."]},{"name":"Smoked Banana Rum Punch","desc":"Smith & Cross rum, banana liqueur, pineapple, lime, and smoke for a tiki-style presentation drink.","ingredients":["1 1/2 oz Smith & Cross Rum","1/2 oz Giffard Banane du Br\u00e9sil","3/4 oz pineapple juice","1/2 oz fresh lime juice","1/4 oz demerara syrup","1 dash Angostura aromatic bitters"],"directions":"Shake with ice until chilled and strain over crushed ice in a tiki mug or double rocks glass. Finish with a brief cap of smoke from the smoking gun. Garnish with a pineapple wedge.","swaps":["Use Diplomatico for a sweeter dessert-like punch.","Add 1/4 oz Chinola Pineapple for more fruit."]},{"name":"Smoked Espresso Martini","desc":"Grey Goose vodka, Mr Black, espresso, and a hint of smoke for a dramatic after-dinner Martini.","ingredients":["1 1/2 oz Grey Goose Vodka","1 oz Mr Black Coffee Liqueur","1 oz fresh espresso","1/4 oz simple syrup"],"directions":"Shake very hard with ice and double strain into a chilled martini glass. Briefly smoke the glass before pouring so the drink carries the aroma without tasting acrid. Garnish with three coffee beans.","swaps":["Add 1/4 oz Cr\u00e8me de Cacao for a smoked mocha build.","Use vanilla vodka for a sweeter caf\u00e9 finish."]},{"name":"Smoke Bubble Margarita","desc":"Espolon tequila, lime, and Cointreau served beneath a smoked bubble for a modern tableside Margarita.","ingredients":["2 oz Espolon Blanco Tequila","1 oz fresh lime juice","3/4 oz Cointreau","1/4 oz simple syrup"],"directions":"Shake all ingredients with ice until chilled and double strain into a salt-rimmed coupe or rocks glass over fresh ice. Finish with a smoke bubble over the drink. Garnish with a lime wheel.","swaps":["Add 1/2 oz Chinola Passionfruit for a tropical smoke-bubble version.","Use Grand Marnier for a richer orange profile."]},{"name":"Smoked Tropical Daiquiri","desc":"Rum, pineapple liqueur, lime, and demerara with tropical smoke layered over the glass.","ingredients":["2 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz Chinola Pineapple Liqueur","1/4 oz demerara syrup"],"directions":"Shake with ice until cold and fine strain into a chilled coupe. Lightly smoke the empty glass before pouring or finish with a smoke bubble. Garnish with a pineapple leaf or lime wheel.","swaps":["Split the base with Smith & Cross for more intensity.","Add 1 dash Angostura for a tiki-style spice finish."]},{"name":"Smoked Campari Spritz","desc":"Campari, prosecco, and soda finished with a wisp of smoke for a bitter aperitivo with drama.","ingredients":["2 oz Campari","3 oz Prosecco","1 oz club soda"],"directions":"Build in a wine glass over ice and stir gently. Add a very light cap of citrus smoke just before serving. Garnish with an orange slice.","swaps":["Split the bitter base with Aperol for a softer version.","Add 1/4 oz Choya Yuzu to brighten the center."]},{"name":"Smoked Pineapple Negroni","desc":"Gin, Campari, sweet vermouth, and pineapple liqueur lifted with smoke for a tropical bitter sipper.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Chinola Pineapple Liqueur"],"directions":"Stir all ingredients with ice until chilled. Strain over a large cube in a rocks glass and fill the glass with smoke before serving. Garnish with an orange peel.","swaps":["Use Stiggins' Fancy split with the gin for more pineapple depth.","Add 1 dash grapefruit bitters to keep it dry.","# Margaritas"]},{"name":"Smoked Peach Old Fashioned","desc":"Bourbon, peach bitters, demerara, and smoke --- warm, polished, and tailor-made for slow sipping.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","2 dashes peach bitters","1 dash Angostura bitters"],"directions":"Stir with ice until chilled and strain over a large clear cube in a double rocks glass. Express an orange peel over the drink, then trap peach-wood or cherry-wood smoke in the glass before serving; a sprig of rosemary can be smoked alongside the wood for extra perfume. Garnish with the orange peel.","swaps":["Use rye for a spicier version.","Add 1/4 oz Giffard Peche de Vigne for a more overt stone-fruit","profile."]},{"name":"Smoked Jungle Bird","desc":"Jamaican rum, Campari, pineapple, lime, and demerara with a gentle veil of aromatic smoke.","ingredients":["1 1/2 oz Smith & Cross Rum","3/4 oz Campari","1 1/2 oz pineapple juice","1/2 oz fresh lime juice","1/2 oz demerara syrup"],"directions":"Shake all ingredients with ice and strain into a rocks glass over fresh ice. Add a brief cap of citrus or oak smoke before serving. Garnish with a pineapple frond and lime wheel.","swaps":["Use pineapple wood if you can source it; otherwise citrus wood works","beautifully.","A small cinnamon stick smoked with the wood deepens the tiki spice."]},{"name":"Smoked Saturn","desc":"A Saturn with a subtle smoke layer that turns a bright tiki sour into a dark tropical showpiece.","ingredients":["1 1/2 oz The Botanist Dry Gin","1/2 oz Chinola Passionfruit Liqueur","1/2 oz fresh lemon juice","1/4 oz falernum","1/4 oz orgeat syrup"],"directions":"Shake very hard with ice and double strain into a chilled coupe. Briefly smoke the empty serving glass with citrus wood and a mint leaf before pouring. Garnish with a lemon twist and mint tip.","swaps":["Use Empress gin for a jewel-toned smoked Saturn.","A rosemary-citrus smoke blend works especially well here."]},{"name":"Clarified Mai Tai","desc":"Crystal-clear but intensely flavored, this clarified Mai Tai delivers rum, orange, lime, and almond with haunting smoothness.","ingredients":["1 oz Smith & Cross Rum","1 oz Planteray 3 Stars Rum","3/4 oz fresh lime juice","1/2 oz Cointreau","1/2 oz orgeat syrup","2 oz whole milk"],"directions":"Shake the cocktail ingredients without the milk and set aside. In a separate container, pour the whole milk. Slowly add the mixed cocktail into the milk and let the mixture curdle for 20 minutes. Pass through a coffee filter until the liquid runs clear, then chill \u05d4\u05d9\u05d8. Serve over a large cube in a rocks glass. Garnish with a lime peel.","swaps":["Add 1/4 oz falernum for more tiki spice before clarification.","A grapefruit peel garnish keeps the clarified version feeling fresh."]},{"name":"Clarified Painkiller","desc":"A crystal-clear tropical sipper with the flavor of a Painkiller but the texture and polish of a high-end milk punch.","ingredients":["1 1/2 oz Diplomatico Reserva Exclusiva Rum","1/2 oz Malibu Rum","2 oz pineapple juice","1 oz orange juice","1 oz coconut milk","2 oz whole milk"],"directions":"Build the cocktail without the whole milk and stir until combined. Pour the whole milk into a bowl, then slowly add the cocktail mixture to the milk and let it curdle for 20 to 30 minutes. Filter through coffee filters until clear. Chill and serve over a large cube in a rocks glass. Garnish with an expressed orange peel.","swaps":["Add 1/4 oz falernum before clarification for more spice.","Use Stiggins' Fancy for part of the rum base if you want more","pineapple."]},{"name":"Fat-Washed Old Fashioned","desc":"A deeply textured bourbon Old Fashioned made richer by a butter or coconut-oil wash.","ingredients":["2 oz fat-washed bourbon","1/4 oz demerara syrup","2 dashes Angostura bitters","1 dash orange bitters"],"directions":"For the wash: combine 8 oz bourbon with 1 tbsp melted browned butter or 1 tbsp coconut oil, freeze until the fat solidifies, then strain. Use 2 oz of the washed bourbon, stir with syrup and bitters over ice, and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Browned butter gives a pastry-like finish; coconut oil makes it","softer and more tropical.","A dash of chocolate bitters is fantastic with butter-washed bourbon."]},{"name":"Flaming Blue Blazer","desc":"A dangerous, dramatic classic of whiskey and boiling water thrown in arcs of blue flame.","ingredients":["2 oz overproof bourbon or cask-strength whiskey","2 oz boiling water","1 tsp demerara syrup"],"directions":"Warm two metal mugs. Add the whiskey to one and the boiling water and syrup to the other. Carefully ignite the whiskey, then pour the flaming liquid back and forth between the mugs in controlled arcs several times. Extinguish, pour into a heatproof mug, and garnish with a lemon peel. Use extreme caution and keep a lid handy.","swaps":["Do not make this around guests until you've practiced safely.","A cinnamon stick garnish adds excellent aroma once the flames are out."]},{"name":"Pousse-Caf\u00e9","desc":"A layered after-dinner showpiece built from liqueurs of different densities and served unmixed.","ingredients":["1/2 oz grenadine","1/2 oz green Chartreuse","1/2 oz blue cura\u00e7ao","1/2 oz Irish cream"],"directions":"Using the back of a spoon, carefully layer each ingredient in a narrow cordial glass from heaviest to lightest. Serve immediately without stirring.","swaps":["Practice with water-dyed syrups first if you've never layered","drinks.","Frangelico and coffee liqueur can be swapped into layers for different","color schemes."]},{"name":"Smoked Rosemary Negroni","desc":"A Negroni perfumed with rosemary and citrus smoke for a dramatic aperitivo showpiece.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","1 oz Martini & Rossi Sweet Vermouth"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Smoke the serving glass with oak or citrus wood and a sprig of rosemary before pouring. Garnish with an orange peel.","swaps":["Use Hendrick's Neptunia for a brighter coastal version.","A grapefruit peel garnish makes the bitterness pop."]},{"name":"Clarified Jungle Bird","desc":"A pristine clarified version of the Jungle Bird that keeps its bitter pineapple soul while drinking silky and clear.","ingredients":["1 1/2 oz Smith & Cross Rum","3/4 oz Campari","1 1/2 oz pineapple juice","1/2 oz fresh lime juice","1/2 oz demerara syrup","2 oz whole milk"],"directions":"Shake all ingredients except the milk with ice. Pour the milk into a bowl, then slowly add the mixed cocktail to the milk and let it curdle for 20 minutes. Filter through coffee filters until clear. Chill and serve over a large cube in a rocks glass. Garnish with a grapefruit peel.","swaps":["Use Diplomatico for a softer clarified Jungle Bird.","A tiny dash of falernum before clarification gives extra spice.","# Advanced Techniques"]}]},{"name":"Weird & Experimental","subsections":[],"drinks":[{"name":"Olive Oil Martini","desc":"A glossy, savory martini with gin, dry vermouth, olive oil, and a luxurious silky texture.","ingredients":["2 1/4 oz The Botanist Dry Gin","1/2 oz Martini & Rossi Dry Vermouth","1 tsp extra virgin olive oil","1 dash orange bitters"],"directions":"Add all ingredients to a mixing glass with plenty of ice and stir until very cold. Strain into a chilled martini glass and garnish with a lemon peel or green olive.","swaps":["Use Hendrick's Oasium for a greener, softer olive oil martini.","A tiny pinch of sea salt rounds the texture beautifully."]},{"name":"Banana Boulevardier","desc":"Bourbon, Campari, vermouth, and banana liqueur in a bitter tropical riff that shouldn't work but absolutely does.","ingredients":["1 1/2 oz Woodford Reserve Bourbon","3/4 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Giffard Banane du Br\u00e9sil"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Use rye for a drier finish.","A dash of chocolate bitters makes this especially compelling."]},{"name":"Pineapple Negroni","desc":"Gin, Campari, vermouth, and pineapple liqueur for a bright bitter Negroni with tropical perfume.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Chinola Pineapple Liqueur"],"directions":"Stir with ice until cold and strain over a large cube in a rocks glass. Garnish with an orange peel and pineapple leaf.","swaps":["Use Stiggins' Fancy split with the gin for more pineapple depth.","A touch of smoke works very well with citrus wood."]},{"name":"Peanut Butter Daiquiri","desc":"White rum, lime, peanut butter whiskey, and demerara in a weirdly delicious tropical-dessert sour.","ingredients":["1 1/2 oz Planteray 3 Stars Rum","1/2 oz Screwball Peanut Butter Whiskey","3/4 oz fresh lime juice","1/4 oz demerara syrup"],"directions":"Shake very hard with ice and double strain into a chilled coupe. Garnish with a lime wheel.","swaps":["Add 1/4 oz banana liqueur for a peanut-butter-banana version.","A tiny pinch of sea salt is excellent here."]},{"name":"Midori Last Word","desc":"Melon liqueur twists the Last Word into something neon, weird, and unexpectedly balanced.","ingredients":["3/4 oz Aviation Gin","3/4 oz Midori","3/4 oz Luxardo Maraschino","3/4 oz fresh lime juice"],"directions":"Shake hard with ice and strain into a chilled coupe. Garnish with a lime twist.","swaps":["Add 1/4 oz Green Chartreuse if you want it more herbal and less","candied.","Use vodka for an even more surreal melon profile."]},{"name":"Coconut Negroni","desc":"Gin, Campari, vermouth, and coconut-washed sweetness in a beach-adjacent bitter sipper.","ingredients":["1 oz The Botanist Dry Gin","1 oz Campari","3/4 oz Martini & Rossi Sweet Vermouth","1/4 oz Malibu Rum"],"directions":"Stir with ice until cold and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Use Stiggins' Fancy instead of Malibu for less sweetness.","A pinch of sea salt helps the coconut read more clearly."]},{"name":"Yuzu Espresso Tonic","desc":"Coffee, tonic-like fizz, yuzu, and vodka in a bright bitter highball that feels half cocktail and half caf\u00e9 experiment.","ingredients":["1 oz Grey Goose Vodka","1/2 oz Choya Yuzu","1 oz chilled espresso","2 oz club soda","1/4 oz simple syrup"],"directions":"Shake vodka, yuzu, espresso, and simple briefly with ice and strain into a highball glass over fresh ice. Top with soda and garnish with a lemon peel.","swaps":["Use Mr Black for 1/4 oz of the vodka to deepen the coffee side.","A grapefruit peel makes it more aperitif-like."]},{"name":"Tomato Water Martini","desc":"A crystal-clear savory martini built with gin, dry vermouth, tomato water, and celery bitters.","ingredients":["2 oz Hendrick's Oasium Gin","1/2 oz Martini & Rossi Dry Vermouth","1/2 oz tomato water","2 dashes celery bitters"],"directions":"Stir with ice until very cold and strain into a chilled martini glass. Garnish with a lemon twist or a tiny tomato leaf if available.","swaps":["Use vodka for a cleaner, more saline profile.","A tiny pinch of salt wakes up the tomato beautifully."]},{"name":"Celery Gimlet","desc":"A bright, savory gimlet with gin, lime, celery bitters, and a greener-than-expected finish.","ingredients":["2 oz The Botanist Dry Gin","3/4 oz fresh lime juice","1/2 oz simple syrup","2 dashes celery bitters"],"directions":"Shake with ice until chilled and double strain into a chilled coupe. Garnish with a lime twist or celery leaf.","swaps":["Use cucumber syrup in place of simple for a cooler garden feel.","Neptunia adds a nice coastal edge."]},{"name":"Passionfruit Ramos Fizz","desc":"The notorious Ramos structure meets tropical passionfruit for a fluffy, citrusy, show-off fizz.","ingredients":["1 oz Aviation Gin","1/2 oz Chinola Passionfruit Liqueur","1/2 oz fresh lemon juice","1/2 oz fresh lime juice","1/2 oz simple syrup","1 oz cream","1 egg white","2 oz club soda"],"directions":"Dry shake vigorously, then shake again with ice for at least 20 seconds. Strain into a chilled Collins glass and let settle for 20 seconds before topping with soda so the foam rises above the rim. Garnish with a lime wheel.","swaps":["Use orange flower water if you have it for a more classic Ramos","aroma.","A few drops of absinthe turn this wonderfully strange."]},{"name":"Toasted Sesame Old Fashioned","desc":"Bourbon, demerara, sesame oil, and bitters in a savory nutty Old Fashioned with huge depth.","ingredients":["2 oz Woodford Reserve Bourbon","1/4 oz demerara syrup","1 drop toasted sesame oil","2 dashes Angostura bitters","1 dash orange bitters"],"directions":"Stir with ice until chilled and strain over a large cube in a rocks glass. Garnish with an orange peel.","swaps":["Add 1 dash chocolate bitters for a deeper roasted finish.","A wash of smoke with oak or cherry wood is excellent."]},{"name":"Blue Curacao Corpse Reviver","desc":"A blue-hued, citrus-forward riff on the Corpse Reviver with orange, lemon, and a whisper of absinthe.","ingredients":["3/4 oz Grey Goose Vodka","3/4 oz Blue Curacao","3/4 oz Cointreau","3/4 oz fresh lemon juice","1 dash absinthe"],"directions":"Shake very hard with ice and double strain into a chilled coupe. Garnish with a lemon twist.","swaps":["Use gin instead of vodka for more structure.","A half barspoon of simple will soften the bitter citrus edge."]},{"name":"Banana Chartreuse Flip","desc":"Banana liqueur, Green Chartreuse, rum, and egg for a rich, velvety, off-the-wall after-dinner drink.","ingredients":["1 oz Diplomatico Reserva Exclusiva Rum","1/2 oz Giffard Banane du Br\u00e9si
